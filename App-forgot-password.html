<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password — Alygnn</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800;900&display=swap" rel="stylesheet">

<style>
:root{
    --brand:#5D7FA3;
    --bg:#05080D;
    --card-bg:rgba(18,24,36,.94);
    --text:#FFFFFF;
    --border:rgba(255,255,255,.12);
    --text-muted:#A7B0BC;
    --error:#D79A9A;
    --success:#6FBF8F;
}

*{
    box-sizing:border-box;
    font-family:'DM Sans',Arial,sans-serif!important;
}

html,body{
    margin:0;
    min-height:100%;
    background:#05080D;
    color:var(--text);
}

body{
    min-height:100vh;
    background:
        radial-gradient(circle at top,rgba(93,127,163,.35),transparent 35%),
        linear-gradient(180deg,#05080D,#0A0F17);
}

.screen{
    min-height:100vh;
    padding:20px;
    display:flex;
    align-items:center;
    justify-content:center;
}

.card{
    width:100%;
    max-width:430px;
    background:var(--card-bg);
    border:1px solid var(--border);
    border-radius:34px;
    padding:34px 26px;
    box-shadow:0 25px 70px rgba(0,0,0,.45);
}

.logo{
    text-align:center;
    font-size:48px;
    font-weight:900;
    color:var(--brand);
    letter-spacing:-2px;
}

.title{
    text-align:center;
    font-size:34px;
    font-weight:900;
    margin-top:22px;
}

.subtitle{
    text-align:center;
    color:var(--text-muted);
    line-height:1.55;
    margin:10px 0 28px;
}

.input{
    width:100%;
    padding:18px 20px;
    border-radius:18px;
    border:1px solid var(--border);
    background:rgba(255,255,255,.03);
    color:white;
    font-size:17px;
}

.input::placeholder{
    color:rgba(255,255,255,.45);
}

.input:focus{
    outline:none;
    border-color:var(--brand);
}

.btn{
    width:100%;
    min-height:58px;
    margin-top:14px;
    border:none;
    border-radius:18px;
    background:var(--brand);
    color:white;
    font-size:18px;
    font-weight:900;
    cursor:pointer;
}

.btn:disabled{
    opacity:.65;
    cursor:not-allowed;
}

.message{
    display:none;
    margin-bottom:16px;
    font-size:14px;
    font-weight:800;
    line-height:1.45;
}

.message.error{color:var(--error)}
.message.success{color:var(--success)}

.back{
    display:block;
    text-align:center;
    color:var(--text-muted);
    text-decoration:none;
    font-weight:800;
    margin-top:22px;
}

.back:hover{color:var(--brand)}
</style>
</head>

<body>
<div class="screen">
    <div class="card">
        <div class="logo">Alygnn.</div>
        <div class="title">Forgot password?</div>

        <div class="subtitle">
            Enter the email connected to your Alygnn account. We’ll send you a secure reset link.
        </div>

        <div id="message" class="message"></div>

        <input
            id="email"
            class="input"
            type="email"
            placeholder="Email address"
            autocomplete="email"
            onkeydown="if(event.key==='Enter') sendResetEmail()"
        >

        <button id="sendBtn" class="btn" onclick="sendResetEmail()">
            Send Reset Link
        </button>

        <a class="back" href="app-login.html">← Back to Sign In</a>
    </div>
</div>

<script>
const SUPABASE_URL = "https://auth.alygnn.com";
const SUPABASE_KEY = "sb_publishable_3l8krRh6WCyvKfNumWDBDw_C6CKr7rG";

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
    auth: {
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true
    }
});

function showMessage(text,type){
    const message = document.getElementById("message");
    message.textContent = text;
    message.className = "message " + type;
    message.style.display = "block";
}

async function sendResetEmail(){
    const email = document.getElementById("email").value.trim().toLowerCase();
    const button = document.getElementById("sendBtn");

    if(!email){
        showMessage("Please enter your email address.","error");
        return;
    }

    button.disabled = true;
    button.textContent = "Sending...";

    const { error } = await sb.auth.resetPasswordForEmail(email, {
        redirectTo: "https://alygnn.com/app-reset-password.html"
    });

    if(error){
        const raw = (error.message || "").toLowerCase();

        if(raw.includes("rate limit") || raw.includes("too many")){
            showMessage("Too many reset attempts. Wait a few minutes and try again.","error");
        }else{
            showMessage(error.message || "Unable to send the reset email.","error");
        }

        button.disabled = false;
        button.textContent = "Send Reset Link";
        return;
    }

    showMessage("Reset link sent. Check your inbox and spam folder.","success");
    button.textContent = "Email Sent";
}
</script>
</body>
</html>
