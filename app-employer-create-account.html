<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#F6F8F7">
<title>Create Employer Account | Alygnn</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&family=DM+Serif+Display&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'DM Sans',Arial,sans-serif!important}
:root{--brand:#5D7FA3;--sage:#8CB69B;--bg:#F6F8F7;--text:#172333;--muted:#59697A;--border:#DDE3E8;--accent:#3568C0;--accent-dark:#2857A8;--accent-bg:#EDF3FC;--danger:#B64040;--danger-bg:#FCEDED;--success:#18794E;--success-bg:#E8F6EE}
html,body{width:100%;min-height:100%}
body{min-height:100vh;background:radial-gradient(circle at 12% 8%,rgba(140,182,155,.12),transparent 28%),radial-gradient(circle at 90% 85%,rgba(93,127,163,.14),transparent 31%),var(--bg);color:var(--text)}
button,input,a{font:inherit}
.page{width:100%;max-width:540px;min-height:100vh;margin:0 auto;padding:calc(18px + env(safe-area-inset-top)) 20px calc(30px + env(safe-area-inset-bottom))}
.topbar{min-height:51px;display:grid;grid-template-columns:48px 1fr 48px;align-items:center}
.back-btn{width:44px;height:44px;border:1px solid var(--border);border-radius:50%;background:#fff;color:var(--text);font-size:21px;display:flex;align-items:center;justify-content:center;box-shadow:0 5px 16px rgba(23,35,51,.06)}
.brand{text-align:center;font-family:'DM Serif Display',Georgia,serif!important;font-size:31px;color:var(--brand)}
.brand span{color:var(--sage)}
.hero{padding:26px 0 10px;text-align:center}
.hero-icon{width:72px;height:72px;margin:0 auto;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--accent);background:var(--accent-bg)}
.hero-icon svg{width:35px;height:35px}
h1{margin-top:18px;font-size:29px;line-height:1.12;letter-spacing:-.5px;font-weight:900}
.hero p{max-width:360px;margin:9px auto 0;color:var(--muted);font-size:14px;line-height:1.5}
.form{margin-top:25px}
.field{margin-top:16px}
.field:first-child{margin-top:0}
label{display:block;margin-bottom:8px;font-size:13px;font-weight:900}
.input-wrap{min-height:56px;padding:0 15px;border:1px solid var(--border);border-radius:17px;background:rgba(255,255,255,.95);display:flex;align-items:center;gap:11px}
.input-wrap:focus-within{border-color:var(--accent);box-shadow:0 0 0 4px rgba(53,104,192,.11)}
.field-icon{width:20px;height:20px;color:#7A8794;flex:0 0 20px}
input{width:100%;min-width:0;border:none;outline:none;background:transparent;color:var(--text);font-size:15px}
input::placeholder{color:#98A2AD}
.show-btn{border:none;background:transparent;color:var(--muted);font-size:12px;font-weight:900}
.password-help{margin-top:7px;color:#7E8A96;font-size:11px;line-height:1.45}
.check-row{margin-top:18px;display:flex;align-items:flex-start;gap:10px}
.check-row input{width:18px;height:18px;margin-top:1px;accent-color:var(--accent);flex:0 0 18px}
.check-row label{margin:0;color:var(--muted);font-size:12px;line-height:1.5;font-weight:600}
.check-row a{color:var(--accent-dark);text-decoration:none;font-weight:900}
.message{display:none;margin-top:16px;padding:12px 14px;border-radius:14px;font-size:12px;line-height:1.45;font-weight:700}
.message.error{display:block;color:var(--danger);background:var(--danger-bg)}
.message.success{display:block;color:var(--success);background:var(--success-bg)}
.primary{width:100%;min-height:56px;margin-top:22px;border:none;border-radius:17px;background:var(--accent);color:#fff;font-size:15px;font-weight:900;box-shadow:0 9px 24px rgba(53,104,192,.22)}
.primary:disabled,.social:disabled{opacity:.65}
.divider{margin:25px 0 15px;display:flex;align-items:center;gap:13px;color:#8995A1;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.7px}
.divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--border)}
.social{width:100%;min-height:54px;border:1px solid var(--border);border-radius:17px;background:#fff;color:var(--text);display:flex;align-items:center;justify-content:center;gap:12px;font-size:14px;font-weight:900}
.google-mark{width:22px;height:22px;border-radius:50%;display:grid;place-items:center;color:#4285F4;font-size:16px;font-weight:900}
.signin{margin-top:24px;text-align:center;color:var(--muted);font-size:13px}
.signin a{color:var(--accent-dark);text-decoration:none;font-weight:900}
@media(max-height:760px){.hero{padding-top:14px}.hero-icon{width:60px;height:60px}h1{font-size:26px;margin-top:13px}.form{margin-top:19px}.field{margin-top:12px}.input-wrap{min-height:51px}.primary{min-height:52px;margin-top:17px}}
</style>
</head>
<body>
<main class="page">
<header class="topbar">
<button class="back-btn" id="back-btn" type="button" aria-label="Go back">←</button>
<div class="brand">Alygnn<span>.</span></div><div></div>
</header>
<section class="hero">
<div class="hero-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="7" width="18" height="13" rx="2"></rect><path d="M9 7V5.5A1.5 1.5 0 0 1 10.5 4h3A1.5 1.5 0 0 1 15 5.5V7"></path><path d="M3 12h18"></path><path d="M10 12v2h4v-2"></path></svg></div>
<h1>Create your employer account</h1>
<p>Post jobs, review qualified candidates, and manage your hiring process from Alygnn.</p>
</section>
<section class="form">
<div class="field"><label for="full-name">Your full name</label><div class="input-wrap"><svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"></circle><path d="M4.5 21c.7-4.1 3.2-6.2 7.5-6.2s6.8 2.1 7.5 6.2"></path></svg><input id="full-name" type="text" placeholder="Enter your full name" autocomplete="name"></div></div>
<div class="field"><label for="company-name">Company name</label><div class="input-wrap"><svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 21V4h11v17"></path><path d="M15 9h5v12"></path><path d="M8 8h3M8 12h3M8 16h3"></path></svg><input id="company-name" type="text" placeholder="Enter your company name" autocomplete="organization"></div></div>
<div class="field"><label for="email">Work email address</label><div class="input-wrap"><svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"></rect><path d="m3 7 9 6 9-6"></path></svg><input id="email" type="email" placeholder="Enter your work email" autocomplete="email" inputmode="email"></div></div>
<div class="field"><label for="password">Create password</label><div class="input-wrap"><svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="10" width="14" height="10" rx="2"></rect><path d="M8 10V7a4 4 0 0 1 8 0v3"></path></svg><input id="password" type="password" placeholder="At least 8 characters" autocomplete="new-password"><button class="show-btn" id="show-password" type="button">Show</button></div><div class="password-help">Use at least 8 characters with a mix of letters and numbers.</div></div>
<div class="field"><label for="confirm-password">Confirm password</label><div class="input-wrap"><svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="10" width="14" height="10" rx="2"></rect><path d="M8 10V7a4 4 0 0 1 8 0v3"></path></svg><input id="confirm-password" type="password" placeholder="Re-enter your password" autocomplete="new-password"></div></div>
<div class="check-row"><input id="terms" type="checkbox"><label for="terms">I agree to Alygnn’s <a href="terms.html">Terms</a> and <a href="privacy.html">Privacy Policy</a>.</label></div>
<div id="message" class="message" aria-live="polite"></div>
<button class="primary" id="create-btn" type="button">Create employer account</button>
<div class="divider">or continue with</div>
<button class="social" id="google-btn" type="button"><span class="google-mark">G</span><span>Continue with Google</span></button>
<div class="signin">Already have an employer account? <a href="app-employer-login.html">Sign in</a></div>
</section>
</main>
<script>
const sb=supabase.createClient('https://auth.alygnn.com','sb_publishable_3l8krRh6WCyvKfNumWDBDw_C6CKr7rG',{auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:true}});
function showMessage(text,type){const m=document.getElementById('message');m.textContent=text;m.className='message '+type}
function setLoading(btn,on,a,b){btn.disabled=on;btn.textContent=on?a:b}
function friendlyError(error){const raw=String(error?.message||'').toLowerCase();if(raw.includes('already registered')||raw.includes('already been registered'))return 'An account already exists with this email. Try signing in instead.';if(raw.includes('rate limit')||raw.includes('too many requests'))return 'Too many attempts. Please wait a few minutes and try again.';if(raw.includes('fetch')||raw.includes('network'))return 'Unable to connect. Please check your internet connection.';return error?.message||'Unable to create your account.'}
async function createEmployerAccount(){
const fullName=document.getElementById('full-name').value.trim();
const companyName=document.getElementById('company-name').value.trim();
const email=document.getElementById('email').value.trim().toLowerCase();
const password=document.getElementById('password').value;
const confirmPassword=document.getElementById('confirm-password').value;
const accepted=document.getElementById('terms').checked;
const button=document.getElementById('create-btn');
if(!fullName)return showMessage('Please enter your full name.','error');
if(!companyName)return showMessage('Please enter your company name.','error');
if(!email||!email.includes('@'))return showMessage('Please enter a valid work email address.','error');
if(password.length<8)return showMessage('Your password must be at least 8 characters.','error');
if(password!==confirmPassword)return showMessage('Your passwords do not match.','error');
if(!accepted)return showMessage('Please agree to the Terms and Privacy Policy.','error');
setLoading(button,true,'Creating account…','Create employer account');
const {data,error}=await sb.auth.signUp({email,password,options:{emailRedirectTo:'https://alygnn.com/app-employer-dashboard.html',data:{full_name:fullName,name:fullName,company_name:companyName,account_type:'employer',role:'employer'}}});
if(error){showMessage(friendlyError(error),'error');setLoading(button,false,'Creating account…','Create employer account');return}
localStorage.setItem('alygnn_account_type','employer');
if(data.session){
try{await sb.from('profiles').upsert({id:data.user.id,full_name:fullName,company_name:companyName,role:'employer',account_type:'employer',updated_at:new Date().toISOString()})}catch(e){console.warn(e)}
showMessage('Account created. Opening your employer dashboard…','success');
setTimeout(()=>window.location.replace('app-employer-dashboard.html'),650);return}
showMessage('Account created. Check your email to confirm your account, then sign in.','success');
button.textContent='Check your email';
setTimeout(()=>window.location.href='app-employer-login.html',2600)
}
async function googleSignup(){
const button=document.getElementById('google-btn');setLoading(button,true,'Opening Google…','Continue with Google');localStorage.setItem('alygnn_account_type','employer');
const {error}=await sb.auth.signInWithOAuth({provider:'google',options:{redirectTo:'https://alygnn.com/app-employer-dashboard.html',queryParams:{access_type:'offline',prompt:'consent'}}});
if(error){showMessage(friendlyError(error),'error');setLoading(button,false,'Opening Google…','Continue with Google')}
}
document.getElementById('back-btn').addEventListener('click',()=>window.location.href='app-employer-login.html');
document.getElementById('show-password').addEventListener('click',e=>{const p=document.getElementById('password'),c=document.getElementById('confirm-password'),showing=p.type==='text';p.type=showing?'password':'text';c.type=showing?'password':'text';e.currentTarget.textContent=showing?'Show':'Hide'});
document.getElementById('create-btn').addEventListener('click',createEmployerAccount);
document.getElementById('google-btn').addEventListener('click',googleSignup);
document.getElementById('confirm-password').addEventListener('keydown',e=>{if(e.key==='Enter')createEmployerAccount()});
</script>
</body>
</html>
