<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password | Alygnn</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
body{font-family:'DM Sans',sans-serif;background:#F6F8F7;display:flex;justify-content:center;align-items:center;height:100vh;margin:0}
.card{width:420px;max-width:90%;background:#FCFCFA;border:1px solid #DDE3E8;border-radius:24px;padding:40px}
h1{font-family:'DM Serif Display',serif;color:#1A2530;margin-top:0}
p{color:#4A5968}
input{width:100%;padding:16px;border:1px solid #DDE3E8;border-radius:14px;font-size:16px;box-sizing:border-box;margin:16px 0}
button{width:100%;padding:16px;background:#5D7FA3;color:#fff;border:none;border-radius:14px;font-size:16px;cursor:pointer}
button:hover{opacity:.9}
</style>
</head>
<body>
<div class="card">
<h1>Reset your password</h1>
<p>Enter your new password below.</p>
<input id="password" type="password" placeholder="New password (minimum 8 characters)">
<button onclick="updatePassword()">Update Password</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const sb = supabase.createClient(
 'https://auth.alygnn.com',
 'sb_publishable_3l8krRh6WCyvKfNumWDBDw_C6CKr7rG'
);

async function updatePassword(){
 const password = document.getElementById('password').value;

 if(password.length < 8){
   alert('Password must be at least 8 characters.');
   return;
 }

 const { error } = await sb.auth.updateUser({ password });

 if(error){
   alert(error.message);
   return;
 }

 alert('Password updated successfully!');
 window.location.href='login.html';
}
</script>
</body>
</html>
