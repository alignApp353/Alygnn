<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<title>Reset your password — Alygnn</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --brand: #5D7FA3; --bg: #F6F8F7; --card-bg: #FCFCFA;
    --text: #1A2530; --border: #DDE3E8; --mint: #6FBF8F; --text-muted: #4A5968;
  }
  body {
    font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px;
  }
  .card {
    width: 100%; max-width: 420px; background: var(--card-bg);
    border: 1px solid var(--border); border-radius: 20px; padding: 40px;
  }
  .logo {
    font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--brand);
    margin-bottom: 24px; text-align: center; display: block; text-decoration: none;
  }
  h1 { font-family: 'DM Serif Display', serif; font-size: 26px; letter-spacing: -0.5px; margin-bottom: 8px; text-align: center; }
  .sub { font-size: 14px; color: var(--text-muted); text-align: center; margin-bottom: 28px; line-height: 1.6; }

  .msg-box { border-radius: 10px; padding: 11px 15px; font-size: 13px; margin-bottom: 16px; display: none; }
  .msg-box.error { background: rgba(215,154,154,0.15); border: 1px solid rgba(215,154,154,0.4); color: #8a4040; }
  .msg-box.success { background: rgba(111,191,143,0.15); border: 1px solid rgba(111,191,143,0.4); color: #1a5c35; }

  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 7px; }
  .password-wrap { position: relative; }
  .password-wrap input {
    width: 100%; padding: 13px 44px 13px 16px; border: 1px solid var(--border);
    border-radius: 12px; font-size: 15px; font-family: 'DM Sans', sans-serif; outline: none;
  }
  .password-wrap input:focus { border-color: var(--brand); }
  .eye-btn {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer; color: var(--text-muted);
    padding: 4px; display: flex; transition: color 0.2s;
  }
  .eye-btn:hover { color: var(--brand); }

  .btn-submit {
    width: 100%; background: var(--brand); color: white; border: none;
    border-radius: 12px; padding: 15px; font-size: 16px; font-weight: 500;
    font-family: 'DM Sans', sans-serif; cursor: pointer; margin-top: 8px;
  }
  .btn-submit:hover { opacity: 0.88; }
  .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }

  .back-link { display: block; text-align: center; margin-top: 18px; font-size: 13px; color: var(--text-muted); text-decoration: none; }
  .back-link:hover { color: var(--brand); }

  /* Error state shown when link is expired */
  .expired-state { text-align: center; }
  .expired-icon { font-size: 40px; margin-bottom: 16px; }
  .expired-state h1 { margin-bottom: 10px; }
  .expired-state .sub { margin-bottom: 24px; }
  .btn-request { width: 100%; background: var(--brand); color: white; border: none; border-radius: 12px; padding: 15px; font-size: 16px; font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer; }
  .btn-request:hover { opacity: 0.88; }
</style>
</head>
<body>

<div class="card" id="card">
  <!-- Content injected by JS based on whether link is valid or expired -->
</div>

<script>
  const SUPABASE_URL = 'https://auth.alygnn.com';
  const SUPABASE_ANON_KEY = 'sb_publishable_3l8krRh6WCyvKfNumWDBDw_C6CKr7rG';
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const card = document.getElementById('card');

  function showMsg(text, type = 'error') {
    const b = document.getElementById('msg-box');
    if (!b) return;
    b.textContent = text;
    b.className = 'msg-box ' + type;
    b.style.display = 'block';
  }

  function toggleEye(inputId, btn) {
    const input = document.getElementById(inputId);
    const isHidden = input.type === 'password';
    input.type = isHidden ? 'text' : 'password';
    btn.querySelector('svg').innerHTML = isHidden
      ? '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>'
      : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }

  function renderExpired() {
    card.innerHTML = `
      <a href="index.html" class="logo">Alygnn.</a>
      <div class="expired-state">
        <div class="expired-icon">⏱️</div>
        <h1>Link expired</h1>
        <p class="sub">This password reset link has expired or already been used. Request a new one and try again.</p>
        <button class="btn-request" onclick="window.location.href='login.html'">Back to sign in</button>
        <a href="index.html" class="back-link">← Back to home</a>
      </div>
    `;
  }

  function renderForm() {
    card.innerHTML = `
      <a href="index.html" class="logo">Alygnn.</a>
      <h1>Reset your password</h1>
      <p class="sub">Enter a new password for your account.</p>
      <div class="msg-box" id="msg-box"></div>
      <div class="field">
        <label>New password</label>
        <div class="password-wrap">
          <input type="password" id="new-password" placeholder="At least 8 characters"
            onkeydown="if(event.key==='Enter') submitNewPassword()" />
          <button type="button" class="eye-btn" onclick="toggleEye('new-password', this)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>
      <button class="btn-submit" id="submit-btn" onclick="submitNewPassword()">Set new password</button>
      <a href="index.html" class="back-link">← Back to home</a>
    `;
  }

  async function submitNewPassword() {
    const password = document.getElementById('new-password').value;
    if (!password || password.length < 8) {
      showMsg('Password must be at least 8 characters.');
      return;
    }

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'Saving…';

    const { error } = await sb.auth.updateUser({ password });

    if (error) {
      showMsg(error.message);
      btn.disabled = false;
      btn.textContent = 'Set new password';
      return;
    }

    // Also mark has_password = true in profiles
    const { data: { session } } = await sb.auth.getSession();
    if (session?.user?.id) {
      await sb.from('profiles').upsert({ id: session.user.id, has_password: true });
    }

    showMsg('Password updated! Redirecting…', 'success');
    setTimeout(() => window.location.href = 'login.html', 1500);
  }

  // Check the URL hash for error or valid recovery token
  (async () => {
    const hash = window.location.hash;

    // Supabase puts error info in the hash when link is expired/invalid
    if (hash.includes('error=') || hash.includes('otp_expired')) {
      renderExpired();
      return;
    }

    // Let Supabase process the hash (it contains the recovery token)
    // The onAuthStateChange fires with SIGNED_IN when recovery token is valid
    const { data: { session } } = await sb.auth.getSession();

    if (session) {
      renderForm();
    } else {
      // Wait briefly for Supabase to process the hash token
      sb.auth.onAuthStateChange((event, session) => {
        if (event === 'PASSWORD_RECOVERY' || event === 'SIGNED_IN') {
          renderForm();
        } else if (event === 'SIGNED_OUT' || !session) {
          renderExpired();
        }
      });

      // Fallback timeout — if nothing fires in 3s, show expired
      setTimeout(() => {
        if (document.getElementById('card').innerHTML === '') renderExpired();
      }, 3000);
    }
  })();
</script>
</body>
</html>
