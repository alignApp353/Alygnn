<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alygnn Settings</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800;900&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
    --brand:#5D7FA3;
    --bg:#05080D;
    --card-bg:rgba(18,24,36,.94);
    --text:#FFFFFF;
    --border:rgba(255,255,255,.12);
    --text-muted:#A7B0BC;
    --danger:#D79A9A;
}

body.light{
    --bg:#F6F8F7;
    --card-bg:#FFFFFF;
    --text:#1A2530;
    --border:#DDE3E8;
    --text-muted:#4A5968;
}

*{
    box-sizing:border-box;
    font-family:'DM Sans', Arial, sans-serif !important;
}

body{
    margin:0;
    background:
        radial-gradient(circle at top, rgba(93,127,163,.25), transparent 35%),
        var(--bg);
    color:var(--text);
}

.screen{
    max-width:520px;
    margin:auto;
    min-height:100vh;
    padding:30px 22px 100px;
}

.back{
    font-size:16px;
    color:var(--brand);
    font-weight:800;
    cursor:pointer;
    margin-bottom:20px;
}

.title{
    font-size:38px;
    font-weight:900;
}

.subtitle{
    color:var(--text-muted);
    margin-top:8px;
    line-height:1.5;
}

.card{
    margin-top:22px;
    background:var(--card-bg);
    border:1px solid var(--border);
    border-radius:28px;
    padding:22px;
}

.card-title{
    font-size:22px;
    font-weight:900;
    margin-bottom:16px;
}

.menu{
    display:grid;
    gap:12px;
}

.menu-item{
    background:rgba(255,255,255,.03);
    border:1px solid var(--border);
    border-radius:20px;
    padding:18px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-weight:800;
    cursor:pointer;
}

.theme-btn{
    width:100%;
    padding:18px;
    border-radius:20px;
    border:1px solid var(--border);
    background:transparent;
    color:var(--text);
    font-size:17px;
    font-weight:800;
    margin-top:10px;
    cursor:pointer;
}

.theme-btn.active{
    background:var(--brand);
    color:white;
}

.logout{
    text-align:center;
    color:var(--danger);
    font-size:20px;
    font-weight:900;
    margin-top:35px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="screen">

    <div class="back" onclick="window.location.href='app-account.html'">
        ← Back
    </div>

    <div class="title">Settings</div>

    <div class="subtitle">
        Manage your Alygnn account and personalize your experience.
    </div>

    <div class="card">
        <div class="card-title">Appearance</div>

        <button class="theme-btn" onclick="setTheme('system')">
            System Default
        </button>

        <button class="theme-btn" onclick="setTheme('dark')">
            Dark Mode
        </button>

        <button class="theme-btn" onclick="setTheme('light')">
            Light Mode
        </button>
    </div>

    <div class="card">
        <div class="card-title">Account</div>

        <div class="menu">

            <div class="menu-item" onclick="changePassword()">
                Change Password <span>›</span>
            </div>

            <div class="menu-item"
                 onclick="alert('Notification settings coming soon')">
                Notifications <span>›</span>
            </div>

            <div class="menu-item"
                 onclick="alert('Help Center coming soon')">
                Help & Support <span>›</span>
            </div>

            <div class="menu-item"
                 onclick="alert('Alygnn Version 1.0')">
                About Alygnn <span>›</span>
            </div>

        </div>
    </div>

    <div class="logout" onclick="logoutUser()">
        Log Out
    </div>

</div>

<script>
const SUPABASE_URL = "https://auth.alygnn.com";
const SUPABASE_KEY = "sb_publishable_3l8krRh6WCyvKfNumWDBDw_C6CKr7rG";

const sb = supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);

function applyTheme(theme){
    document.body.classList.remove("light");

    if(theme === "light"){
        document.body.classList.add("light");
    }

    if(theme === "system"){
        if(window.matchMedia("(prefers-color-scheme: light)").matches){
            document.body.classList.add("light");
        }
    }

    document.querySelectorAll(".theme-btn").forEach(btn=>{
        btn.classList.remove("active");

        if(btn.textContent.toLowerCase().includes(theme)){
            btn.classList.add("active");
        }
    });
}

function setTheme(theme){
    localStorage.setItem("alygnn-theme", theme);
    applyTheme(theme);
}

async function changePassword(){
    const newPassword = prompt(
        "Enter your new password (minimum 8 characters):"
    );

    if(!newPassword) return;

    if(newPassword.length < 8){
        alert("Password must be at least 8 characters.");
        return;
    }

    const { error } = await sb.auth.updateUser({
        password: newPassword
    });

    if(error){
        alert(error.message);
        return;
    }

    alert("Password updated successfully!");
}

async function logoutUser(){
    const confirmed = confirm(
        "Are you sure you want to log out?"
    );

    if(!confirmed) return;

    await sb.auth.signOut();
    window.location.href = "app-login.html";
}

const savedTheme =
    localStorage.getItem("alygnn-theme") || "system";

applyTheme(savedTheme);
</script>

</body>
</html>
