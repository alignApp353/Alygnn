<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alygnn Settings</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#020817;
    color:white;
}

.header{
    padding:25px;
    font-size:32px;
    font-weight:bold;
}

.card{
    background:#0f172a;
    border:1px solid rgba(255,255,255,.08);
    border-radius:24px;
    margin:20px;
    padding:24px;
}

.card h2{
    margin-top:0;
}

.option{
    background:#111827;
    border:1px solid rgba(255,255,255,.08);
    padding:18px;
    border-radius:18px;
    margin-top:15px;
    cursor:pointer;
}

.option.active{
    border:1px solid #6b8db6;
    background:#23314b;
}

.back-btn{
    display:block;
    margin:30px 20px;
    text-align:center;
    background:#6b8db6;
    color:white;
    text-decoration:none;
    padding:18px;
    border-radius:18px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="header">Settings</div>

<div class="card">
    <h2>Appearance</h2>

    <div class="option active">
        System Default
    </div>

    <div class="option">
        Dark Mode
    </div>

    <div class="option">
        Light Mode
    </div>
</div>

<div class="card">
    <h2>Notifications</h2>

    <div class="option">
        Job Alerts
    </div>

    <div class="option">
        Application Updates
    </div>
</div>

<a class="back-btn" href="app-account.html">
    Back to Profile
</a>

</body>
</html>
