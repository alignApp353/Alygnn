<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alygnn Settings</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800;900&display=swap" rel="stylesheet">

<style>
:root{
    --brand:#5D7FA3;
    --bg:#05080D;
    --card-bg:rgba(18,24,36,.94);
    --text:#FFFFFF;
    --border:rgba(255,255,255,.12);
    --text-muted:#A7B0BC;
    --danger:#D79A9A;
    --success:#6FBF8F;
}

body.light{
    --bg:#F6F8F7;
    --card-bg:#FFFFFF;
    --text:#1A2530;
    --border:#DDE3E8;
    --text-muted:#4A5968;
}

*{
    box-sizing:border-box;
    font-family:'DM Sans', Arial, sans-serif !important;
}

body{
    margin:0;
    background:
        radial-gradient(circle at top, rgba(93,127,163,.25), transparent 35%),
        var(--bg);
    color:var(--text);
}

.screen{
    max-width:520px;
    margin:auto;
    min-height:100vh;
    padding:30px 22px 100px;
}

.back{
    font-size:16px;
    color:var(--brand);
    font-weight:800;
    cursor:pointer;
    margin-bottom:20px;
}

.title{
    font-size:38px;
    font-weight:900;
}

.subtitle{
    color:var(--text-muted);
    margin-top:8px;
    line-height:1.5;
}

.card{
    margin-top:22px;
    background:var(--card-bg);
    border:1px solid var(--border);
    border-radius:28px;
    padding:22px;
}

.card-title{
    font-size:22px;
    font-weight:900;
    margin-bottom:16px;
}

.theme-btn,
.action-btn{
    width:100%;
    padding:18px;
    border-radius:20px;
    border:1px solid var(--border);
    background:transparent;
    color:var(--text);
    font-size:17px;
    font-weight:800;
    margin-top:10px;
    cursor:pointer;
}

.theme-btn.active,
.action-btn.primary{
    background:var(--brand);
    color:white;
}

.input{
    width:100%;
    padding:17px;
    border-radius:18px;
    border:1px solid var(--border);
    background:rgba(255,255,255,.04);
    color:var(--text);
    font-size:16px;
    margin-top:12px;
}

.input:focus{
    outline:none;
    border-color:var(--brand);
}

.message{
    display:none;
    margin-top:14px;
    font-size:15px;
    font-weight:800;
    line-height:1.4;
}

.message.error{
    color:var(--danger);
}

.message.success{
    color:var(--success);
}

.menu{
    display:grid;
    gap:12px;
}

.menu-item{
    background:rgba(255,255,255,.03);
    border:1px solid var(--border);
    border-radius:20px;
    padding:18px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-weight:800;
    cursor:pointer;
}

.logout{
    text-align:center;
    color:var(--danger);
    font-size:20px;
    font-weight:900;
    margin-top:35px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="screen">

    <div class="back" onclick="window.location.href='app-account.html'">
        ← Back
    </div>

    <div class="title">Settings</div>

    <div class="subtitle">
        Manage your Alygnn account and personalize your experience.
    </div>

    <div id="message" class="message"></div>

    <div class="card">
        <div class="card-title">Appearance</div>

        <button class="theme-btn" onclick="setTheme('system')">System Default</button>
        <button class="theme-btn" onclick="setTheme('dark')">Dark Mode</button>
        <button class="theme-btn" onclick="setTheme('light')">Light Mode</button>
    </div>

    <div class="card">
        <div class="card-title">Change Password</div>

        <input id="newPassword" class="input" type="password" placeholder="New password">
        <input id="confirmPassword" class="input" type="password" placeholder="Confirm password">

        <button id="passwordBtn" class="action-btn primary" onclick="changePassword()">
            Update Password
        </button>
    </div>

    <div class="card">
        <div class="card-title">Account</div>

        <div class="menu">
            <div class="menu-item" onclick="alert('Notification settings coming soon')">
                Notifications <span>›</span>
            </div>

            <div class="menu-item" onclick="alert('Help Center coming soon')">
                Help & Support <span>›</span>
            </div>

            <div class="menu-item" onclick="alert('Alygnn Version 1.0')">
                About Alygnn <span>›</span>
            </div>
        </div>
    </div>

    <div class="logout" onclick="logoutUser()">
        Log Out
    </div>

</div>

<script>
const SUPABASE_URL = "https://auth.alygnn.com";
const SUPABASE_KEY = "sb_publishable_3l8krRh6WCyvKfNumWDBDw_C6CKr7rG";

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function showMessage(text, type){
    const message = document.getElementById("message");
    message.textContent = text;
    message.className = "message " + type;
    message.style.display = "block";
}

async function checkSession(){
    const { data } = await sb.auth.getSession();

    if(!data.session){
        window.location.href = "app-login.html";
    }
}

checkSession();

function applyTheme(theme){
    document.body.classList.remove("light");

    if(theme === "light"){
        document.body.classList.add("light");
    }

    if(theme === "system"){
        if(window.matchMedia("(prefers-color-scheme: light)").matches){
            document.body.classList.add("light");
        }
    }

    document.querySelectorAll(".theme-btn").forEach(btn=>{
        btn.classList.remove("active");

        const text = btn.textContent.toLowerCase();

        if(
            (theme === "system" && text.includes("system")) ||
            (theme === "dark" && text.includes("dark")) ||
            (theme === "light" && text.includes("light"))
        ){
            btn.classList.add("active");
        }
    });
}

function setTheme(theme){
    localStorage.setItem("alygnn-theme", theme);
    applyTheme(theme);
}

async function changePassword(){
    const newPassword = document.getElementById("newPassword").value;
    const confirmPassword = document.getElementById("confirmPassword").value;
    const button = document.getElementById("passwordBtn");

    if(!newPassword || !confirmPassword){
        showMessage("Please fill out both password fields.", "error");
        return;
    }

    if(newPassword.length < 8){
        showMessage("Password must be at least 8 characters.", "error");
        return;
    }

    if(newPassword !== confirmPassword){
        showMessage("Passwords do not match.", "error");
        return;
    }

    button.disabled = true;
    button.textContent = "Updating...";

    const { error } = await sb.auth.updateUser({
        password: newPassword
    });

    if(error){
        showMessage(error.message, "error");
        button.disabled = false;
        button.textContent = "Update Password";
        return;
    }

    document.getElementById("newPassword").value = "";
    document.getElementById("confirmPassword").value = "";

    showMessage("Password updated successfully.", "success");

    button.disabled = false;
    button.textContent = "Update Password";
}

async function logoutUser(){
    await sb.auth.signOut();

    localStorage.removeItem("supabase.auth.token");
    sessionStorage.clear();

    window.location.replace("app-login.html");
}

const savedTheme = localStorage.getItem("alygnn-theme") || "system";
applyTheme(savedTheme);
</script>

</body>
</html>
