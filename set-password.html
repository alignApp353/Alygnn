<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Set your password — Alygnn</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --brand: #5D7FA3; --bg: #F6F8F7; --card-bg: #FCFCFA;
    --text: #1A2530; --border: #DDE3E8; --mint: #6FBF8F; --text-muted: #4A5968;
  }
  body {
    font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  .card {
    width: 100%; max-width: 420px; background: var(--card-bg);
    border: 1px solid var(--border); border-radius: 20px; padding: 40px;
  }
  .logo {
    font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--brand);
    margin-bottom: 24px; text-align: center;
  }
  h1 {
    font-family: 'DM Serif Display', serif; font-size: 26px; letter-spacing: -0.5px;
    margin-bottom: 8px; text-align: center;
  }
  .sub {
    font-size: 14px; color: var(--text-muted); text-align: center;
    margin-bottom: 28px; line-height: 1.6;
  }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 7px; }
  .field input {
    width: 100%; padding: 13px 16px; border: 1px solid var(--border);
    border-radius: 12px; font-size: 15px; font-family: 'DM Sans', sans-serif;
    outline: none;
  }
  .field input:focus { border-color: var(--brand); }
  .msg-box {
    border-radius: 10px; padding: 11px 15px; font-size: 13px;
    margin-bottom: 16px; display: none;
  }
  .msg-box.error { background: rgba(215,154,154,0.15); border: 1px solid rgba(215,154,154,0.4); color: #8a4040; }
  .btn-submit {
    width: 100%; background: var(--brand); color: white; border: none;
    border-radius: 12px; padding: 15px; font-size: 16px; font-weight: 500;
    font-family: 'DM Sans', sans-serif; cursor: pointer; margin-top: 4px;
  }
  .btn-submit:hover { opacity: 0.88; }
  .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
  .skip-link {
    display: block; text-align: center; margin-top: 18px;
    font-size: 13px; color: var(--text-muted); text-decoration: none;
  }
  .skip-link:hover { color: var(--brand); }
</style>
</head>
<body>

<div class="card">
  <div class="logo">Alygnn.</div>
  <h1>Set a password</h1>
  <p class="sub">You signed in with Google. Add a password so you can also sign in with your email next time.</p>

  <div class="msg-box" id="msg-box"></div>

  <div class="field">
    <label>New password</label>
    <input type="password" id="new-password" placeholder="At least 8 characters" onkeydown="if(event.key==='Enter') submitPassword()" />
  </div>

  <button class="btn-submit" id="submit-btn" onclick="submitPassword()">Set password</button>
  <a href="#" class="skip-link" onclick="skipForNow(); return false;">Skip for now</a>
</div>

<script>
  const SUPABASE_URL = 'https://auth.alygnn.com';
  const SUPABASE_ANON_KEY = 'sb_publishable_3l8krRh6WCyvKfNumWDBDw_C6CKr7rG';
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  function showMsg(text) {
    const b = document.getElementById('msg-box');
    b.textContent = text;
    b.className = 'msg-box error';
    b.style.display = 'block';
  }

  function getDestination(role) {
    return role === 'employer' ? 'employer-account.html' : 'account.html';
  }

  async function getRole() {
    const { data: { session } } = await sb.auth.getSession();
    return session?.user?.user_metadata?.role || 'seeker';
  }

  async function submitPassword() {
    const password = document.getElementById('new-password').value;
    if (!password || password.length < 8) {
      showMsg('Password must be at least 8 characters.');
      return;
    }

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'Saving…';

    const { data: { session } } = await sb.auth.getSession();
    if (!session) {
      window.location.href = 'login.html';
      return;
    }

    const { error: updateError } = await sb.auth.updateUser({ password });
    if (updateError) {
      showMsg(updateError.message);
      btn.disabled = false;
      btn.textContent = 'Set password';
      return;
    }

    await sb.from('profiles').upsert({
      id: session.user.id,
      has_password: true,
    });

    const role = await getRole();
    window.location.href = getDestination(role);
  }

  async function skipForNow() {
    // They can set a password later from Settings; just continue on.
    const role = await getRole();
    window.location.href = getDestination(role);
  }

  // If someone lands here without a session, send them back to login.
  (async () => {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) window.location.href = 'login.html';
  })();
</script>
</body>
</html>
