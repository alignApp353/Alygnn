<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Set your password — Alygnn</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --brand: #5D7FA3; --bg: #F6F8F7; --card-bg: #FCFCFA;
    --text: #1A2530; --border: #DDE3E8; --mint: #6FBF8F; --text-muted: #4A5968;
  }
  body {
    font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  .card { display: none; width: 100%; max-width: 420px; background: var(--card-bg);
    border: 1px solid var(--border); border-radius: 20px; padding: 40px;
  }
  .logo {
    font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--brand);
    margin-bottom: 24px; text-align: center;
  }
  h1 {
    font-family: 'DM Serif Display', serif; font-size: 26px; letter-spacing: -0.5px;
    margin-bottom: 8px; text-align: center;
  }
  .sub {
    font-size: 14px; color: var(--text-muted); text-align: center;
    margin-bottom: 28px; line-height: 1.6;
  }
  .field { margin-bottom: 8px; }
  .field label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 7px; }
  .password-wrap { position: relative; }
  .password-wrap input {
    width: 100%; padding: 13px 44px 13px 16px; border: 1px solid var(--border);
    border-radius: 12px; font-size: 15px; font-family: 'DM Sans', sans-serif;
    outline: none;
  }
  .password-wrap input:focus { border-color: var(--brand); }
  .eye-btn {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer; color: var(--text-muted);
    padding: 4px; display: flex; transition: color 0.2s;
  }
  .eye-btn:hover { color: var(--brand); }

  /* Password strength */
  .strength-bar { margin-top: 10px; margin-bottom: 18px; display: none; }
  .strength-track { height: 4px; background: var(--border); border-radius: 100px; margin-bottom: 5px; display: flex; gap: 3px; }
  .strength-seg { flex: 1; border-radius: 100px; background: var(--border); transition: background 0.3s; }
  .strength-label { font-size: 11px; font-weight: 500; margin-bottom: 8px; }
  .strength-rules { display: flex; flex-wrap: wrap; gap: 5px 12px; }
  .rule { font-size: 11px; color: var(--text-muted); display: flex; align-items: center; gap: 4px; transition: color 0.2s; }
  .rule.pass { color: #2d8a57; }
  .rule-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); flex-shrink: 0; transition: background 0.2s; }
  .rule.pass .rule-dot { background: var(--mint); }

  .msg-box {
    border-radius: 10px; padding: 11px 15px; font-size: 13px;
    margin-bottom: 16px; display: none;
  }
  .msg-box.error { background: rgba(215,154,154,0.15); border: 1px solid rgba(215,154,154,0.4); color: #8a4040; }
  .btn-submit {
    width: 100%; background: var(--brand); color: white; border: none;
    border-radius: 12px; padding: 15px; font-size: 16px; font-weight: 500;
    font-family: 'DM Sans', sans-serif; cursor: pointer; margin-top: 4px;
  }
  .btn-submit:hover { opacity: 0.88; }
  .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
  .loading { font-size: 14px; color: var(--text-muted); }
</style>
</head>
<body>

<div class="loading" id="loading">Loading…</div>

<div class="card" id="card">
  <a href="#" onclick="signOutAndGoHome(); return false;" class="logo" style="display:block;text-decoration:none;">Alygnn.</a>
  <h1>Set a password</h1>
  <p class="sub">You signed in with Google. Add a password so you can also sign in with your email next time.</p>

  <div class="msg-box" id="msg-box"></div>

  <div class="field">
    <label>New password</label>
    <div class="password-wrap">
      <input type="password" id="new-password" placeholder="At least 8 characters"
        oninput="checkStrength(this.value)"
        onkeydown="if(event.key==='Enter') submitPassword()" />
      <button type="button" class="eye-btn" onclick="toggleEye()">
        <svg id="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="strength-bar" id="strength-bar">
    <div class="strength-track">
      <div class="strength-seg" id="seg1"></div>
      <div class="strength-seg" id="seg2"></div>
      <div class="strength-seg" id="seg3"></div>
      <div class="strength-seg" id="seg4"></div>
    </div>
    <div class="strength-label" id="strength-label"></div>
    <div class="strength-rules">
      <div class="rule" id="rule-len"><div class="rule-dot"></div>8+ characters</div>
      <div class="rule" id="rule-upper"><div class="rule-dot"></div>Uppercase</div>
      <div class="rule" id="rule-num"><div class="rule-dot"></div>Number</div>
      <div class="rule" id="rule-special"><div class="rule-dot"></div>Symbol</div>
    </div>
  </div>

  <button class="btn-submit" id="submit-btn" onclick="submitPassword()">Set password</button>

  <button onclick="signOutAndGoHome()" style="display:block;width:100%;text-align:center;margin-top:18px;font-size:13px;color:var(--text-muted);text-decoration:none;background:none;border:none;cursor:pointer;">← Back to home</button>
</div>

<script>
  const SUPABASE_URL = 'https://auth.alygnn.com';
  const SUPABASE_ANON_KEY = 'sb_publishable_3l8krRh6WCyvKfNumWDBDw_C6CKr7rG';
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  function showMsg(text) {
    const b = document.getElementById('msg-box');
    b.textContent = text;
    b.className = 'msg-box error';
    b.style.display = 'block';
  }

  function getDestination(role) {
    return role === 'employer' ? 'employer-account.html' : 'account.html';
  }

  async function getRole() {
    const { data: { session } } = await sb.auth.getSession();
    return session?.user?.user_metadata?.role || 'seeker';
  }

  function toggleEye() {
    const input = document.getElementById('new-password');
    const icon = document.getElementById('eye-icon');
    const isHidden = input.type === 'password';
    input.type = isHidden ? 'text' : 'password';
    icon.innerHTML = isHidden
      ? '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>'
      : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }

  function checkStrength(val) {
    const bar = document.getElementById('strength-bar');
    if (!val) { bar.style.display = 'none'; return; }
    bar.style.display = 'block';
    const rules = { len: val.length >= 8, upper: /[A-Z]/.test(val), num: /[0-9]/.test(val), special: /[^A-Za-z0-9]/.test(val) };
    ['len','upper','num','special'].forEach(r => document.getElementById('rule-' + r).classList.toggle('pass', rules[r]));
    const score = Object.values(rules).filter(Boolean).length;
    const colors = ['','#D79A9A','#e8b86d','#5D7FA3','#6FBF8F'];
    const labels = ['','Weak','Fair','Good','Strong'];
    const lc = ['','#8a4040','#7a5a1a','#3a5a7a','#2d8a57'];
    for (let i = 1; i <= 4; i++) document.getElementById('seg'+i).style.background = i <= score ? colors[score] : 'var(--border)';
    const lbl = document.getElementById('strength-label');
    lbl.textContent = labels[score]; lbl.style.color = lc[score];
  }

  async function signOutAndGoHome() {
    // Sign out before going home so the nav shows "Sign in"
    // instead of "My account", breaking the redirect loop.
    await sb.auth.signOut();
    window.location.href = 'index.html';
  }

  async function submitPassword() {
    const password = document.getElementById('new-password').value;
    if (!password || password.length < 8) {
      showMsg('Password must be at least 8 characters.');
      return;
    }

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'Saving…';

    const { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.href = 'login.html'; return; }

    const { error: updateError } = await sb.auth.updateUser({ password });
    if (updateError) {
      showMsg(updateError.message);
      btn.disabled = false;
      btn.textContent = 'Set password';
      return;
    }

    await sb.from('profiles').upsert({ id: session.user.id, has_password: true });

    const role = await getRole();
    window.location.href = getDestination(role);
  }

  // On load: if no session → login. If already has password → skip straight to account.
  (async () => {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.href = 'login.html'; return; }

    const { data: profile } = await sb
      .from('profiles')
      .select('has_password')
      .eq('id', session.user.id)
      .single();

    if (profile?.has_password) {
      const role = session.user.user_metadata?.role || 'seeker';
      window.location.href = getDestination(role);
      return;
    }

    document.getElementById('loading').style.display = 'none';
    document.getElementById('card').style.display = 'block';
  })();
</script>
</body>
</html>
