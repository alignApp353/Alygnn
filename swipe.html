<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Align — Your matches</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --brand: #5D7FA3;
    --sage: #8CB69B;
    --bg: #F6F8F7;
    --card-bg: #FCFCFA;
    --text: #1A2530;
    --border: #DDE3E8;
    --mint: #6FBF8F;
    --rose: #D79A9A;
    --text-muted: #4A5968;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }

  nav {
    background: rgba(246,248,247,0.92); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 5%; display: flex; align-items: center; justify-content: space-between;
    height: 64px; position: sticky; top: 0; z-index: 100;
  }
  .logo { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--brand); letter-spacing: -0.5px; text-decoration: none; }
  .logo span { color: var(--sage); }
  .nav-center { display: flex; align-items: center; gap: 16px; }
  .queue-badge {
    background: var(--brand); color: white;
    font-size: 12px; font-weight: 500;
    padding: 4px 14px; border-radius: 100px;
  }
  .nav-stats { display: flex; gap: 20px; }
  .nav-stat { text-align: center; }
  .ns-val { font-size: 16px; font-weight: 500; color: var(--text); }
  .ns-label { font-size: 10px; color: var(--text-muted); letter-spacing: 0.5px; text-transform: uppercase; }
  .ns-val.green { color: var(--mint); }
  .ns-val.rose { color: var(--rose); }

  /* MAIN */
  main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 20px; }

  /* DECK AREA */
  .deck-area { position: relative; width: 380px; height: 560px; margin-bottom: 28px; }

  /* BACKGROUND CARDS */
  .card-ghost {
    position: absolute; width: 380px;
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 28px; left: 0;
    transition: transform 0.3s ease;
  }
  .ghost-3 { height: 540px; top: 16px; transform: rotate(4deg) scale(0.94); opacity: 0.4; z-index: 1; }
  .ghost-2 { height: 550px; top: 8px; transform: rotate(2deg) scale(0.97); opacity: 0.65; z-index: 2; }

  /* MAIN CARD */
  .swipe-card {
    position: absolute; width: 380px; top: 0; left: 0;
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 28px; z-index: 10;
    cursor: grab; user-select: none;
    transition: box-shadow 0.2s;
    will-change: transform;
  }
  .swipe-card:active { cursor: grabbing; }
  .swipe-card.animating { transition: transform 0.45s cubic-bezier(0.25,0.46,0.45,0.94), opacity 0.45s ease; }

  /* SWIPE OVERLAYS */
  .swipe-overlay {
    position: absolute; top: 24px; border-radius: 12px;
    padding: 8px 18px; font-size: 18px; font-weight: 500;
    opacity: 0; transition: opacity 0.1s; z-index: 20;
    pointer-events: none; letter-spacing: 1px;
  }
  .overlay-apply { left: 24px; background: rgba(111,191,143,0.15); color: var(--mint); border: 2px solid var(--mint); }
  .overlay-skip { right: 24px; background: rgba(215,154,154,0.15); color: var(--rose); border: 2px solid var(--rose); }

  /* CARD CONTENT */
  .card-inner { padding: 28px; }
  .card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 20px; }
  .company-row { display: flex; align-items: center; gap: 12px; }
  .co-logo {
    width: 48px; height: 48px; border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Serif Display', serif; font-size: 20px; color: white; flex-shrink: 0;
  }
  .co-name { font-size: 15px; font-weight: 500; color: var(--text); }
  .co-location { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .match-ring {
    display: flex; flex-direction: column; align-items: center;
    background: rgba(111,191,143,0.1);
    border: 1.5px solid rgba(111,191,143,0.3);
    border-radius: 14px; padding: 8px 14px;
  }
  .match-pct { font-family: 'DM Serif Display', serif; font-size: 22px; color: #2e7a52; letter-spacing: -1px; }
  .match-label { font-size: 9px; color: #3a9463; letter-spacing: 1px; text-transform: uppercase; margin-top: -2px; }

  .job-title { font-family: 'DM Serif Display', serif; font-size: 26px; color: var(--text); letter-spacing: -0.5px; margin-bottom: 6px; line-height: 1.15; }
  .job-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px; }
  .job-tag { font-size: 11px; color: var(--brand); background: rgba(93,127,163,0.1); padding: 3px 10px; border-radius: 100px; }

  .card-divider { border: none; border-top: 1px solid var(--border); margin-bottom: 18px; }

  .comp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 18px; }
  .comp-item label { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-muted); display: block; margin-bottom: 3px; }
  .comp-item span { font-size: 14px; font-weight: 500; color: var(--text); }

  .card-desc { font-size: 13px; color: var(--text-muted); line-height: 1.65; margin-bottom: 20px; }

  .card-actions { display: flex; gap: 10px; padding: 0 4px 4px; }
  .action-btn {
    flex: 1; padding: 14px; border-radius: 16px; border: none;
    font-size: 14px; font-weight: 500; font-family: 'DM Sans', sans-serif;
    cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-skip { background: rgba(215,154,154,0.12); color: #a05858; }
  .btn-skip:hover { background: rgba(215,154,154,0.22); transform: scale(1.02); }
  .btn-info { background: rgba(93,127,163,0.1); color: var(--brand); flex: 0; padding: 14px 16px; }
  .btn-info:hover { background: rgba(93,127,163,0.18); }
  .btn-apply { background: rgba(111,191,143,0.15); color: #2e7a52; }
  .btn-apply:hover { background: rgba(111,191,143,0.25); transform: scale(1.02); }

  /* CONTROLS BAR */
  .controls-bar { display: flex; align-items: center; gap: 16px; }
  .ctrl-btn {
    background: white; border: 1px solid var(--border);
    border-radius: 100px; padding: 10px 20px;
    font-size: 13px; color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
    cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; gap: 6px;
  }
  .ctrl-btn:hover { border-color: var(--brand); color: var(--brand); }
  .ctrl-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .key-hint { font-size: 11px; color: var(--text-muted); }

  /* EMPTY STATE */
  .empty-state {
    display: none; flex-direction: column; align-items: center;
    text-align: center; max-width: 380px;
  }
  .empty-icon {
    width: 80px; height: 80px; border-radius: 24px;
    background: var(--brand); display: flex; align-items: center;
    justify-content: center; font-size: 36px; margin-bottom: 24px;
  }
  .empty-title { font-family: 'DM Serif Display', serif; font-size: 32px; color: var(--text); letter-spacing: -1px; margin-bottom: 12px; }
  .empty-sub { font-size: 16px; color: var(--text-muted); line-height: 1.65; font-weight: 300; margin-bottom: 32px; }
  .empty-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; margin-bottom: 28px; }
  .es-stat { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 20px; }
  .es-val { font-family: 'DM Serif Display', serif; font-size: 32px; color: var(--brand); letter-spacing: -1px; margin-bottom: 4px; }
  .es-val.green { color: var(--mint); }
  .es-label { font-size: 12px; color: var(--text-muted); }
  .btn-refresh { background: var(--brand); color: white; border: none; border-radius: 100px; padding: 16px 36px; font-size: 15px; font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.2s; }
  .btn-refresh:hover { opacity: 0.88; transform: translateY(-1px); }

  /* APPLIED TOAST */
  .toast {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--text); color: white;
    padding: 12px 24px; border-radius: 100px;
    font-size: 14px; font-weight: 500;
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 200; white-space: nowrap;
    display: flex; align-items: center; gap: 8px;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast-dot { width: 8px; height: 8px; border-radius: 50%; }
  .toast-dot.green { background: var(--mint); }
  .toast-dot.rose { background: var(--rose); }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  .deck-area { animation: fadeUp 0.5s ease both; }
  .controls-bar { animation: fadeUp 0.5s ease 0.1s both; }

  @media (max-width: 480px) {
    .deck-area { width: 340px; }
    .card-ghost, .swipe-card { width: 340px; }
    .ghost-3 { display: none; }
    .nav-stats { display: none; }
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">Align<span>.</span></a>
  <div class="nav-center">
    <div class="queue-badge" id="queue-badge">12 matches</div>
  </div>
  <div class="nav-stats">
    <div class="nav-stat">
      <div class="ns-val green" id="stat-applied">0</div>
      <div class="ns-label">Applied</div>
    </div>
    <div class="nav-stat">
      <div class="ns-val rose" id="stat-skipped">0</div>
      <div class="ns-label">Skipped</div>
    </div>
    <div class="nav-stat">
      <div class="ns-val" id="stat-left">12</div>
      <div class="ns-label">Left</div>
    </div>
  </div>
</nav>

<main>
  <!-- DECK -->
  <div class="deck-area" id="deck-area">
    <div class="card-ghost ghost-3"></div>
    <div class="card-ghost ghost-2"></div>
    <div class="swipe-card" id="swipe-card">
      <div class="swipe-overlay overlay-apply" id="overlay-apply">APPLY ✓</div>
      <div class="swipe-overlay overlay-skip" id="overlay-skip">SKIP ✗</div>
      <div class="card-inner" id="card-inner"></div>
    </div>
  </div>

  <!-- CONTROLS -->
  <div class="controls-bar" id="controls-bar">
    <button class="ctrl-btn" id="undo-btn" onclick="undo()" disabled>↩ Undo</button>
    <span class="key-hint">← skip &nbsp;&nbsp; → apply</span>
    <button class="ctrl-btn" onclick="window.location.href='preferences.html'">⚙ Filters</button>
  </div>

  <!-- EMPTY STATE -->
  <div class="empty-state" id="empty-state">
    <div class="empty-icon">✦</div>
    <div class="empty-title">You're all caught up!</div>
    <p class="empty-sub">You've been through all your matches. Here's how you did today.</p>
    <div class="empty-stats">
      <div class="es-stat">
        <div class="es-val green" id="final-applied">0</div>
        <div class="es-label">Jobs applied to</div>
      </div>
      <div class="es-stat">
        <div class="es-val" id="final-skipped">0</div>
        <div class="es-label">Jobs skipped</div>
      </div>
    </div>
    <button class="btn-refresh" onclick="resetDeck()">Load more matches →</button>
  </div>
</main>

<div class="toast" id="toast">
  <div class="toast-dot green" id="toast-dot"></div>
  <span id="toast-msg">Applied!</span>
</div>

<script>
const JOBS = [
  { id:1, company:'Stripe', logo:'S', color:'#5D7FA3', location:'San Francisco, CA · Remote OK', title:'Senior Product Designer', match:94, salary:'$145k–$175k', k401:'4% match', health:'Full coverage', pto:'Unlimited', tags:['Figma','Design systems','B2B SaaS'], desc:'Lead the design of Stripe\'s core payment interfaces, working closely with engineers and PMs to ship beautiful, accessible products used by millions of businesses.' },
  { id:2, company:'Linear', logo:'L', color:'#2C2C2A', location:'Remote · US only', title:'Product Designer', match:91, salary:'$130k–$160k', k401:'3% match', health:'Full coverage', pto:'25 days', tags:['Product design','Developer tools','Remote'], desc:'Shape the future of how software teams track and manage their work. You\'ll own entire product flows from concept to pixel-perfect delivery.' },
  { id:3, company:'Figma', logo:'F', color:'#8CB69B', location:'New York, NY · Hybrid', title:'Staff UX Designer', match:89, salary:'$160k–$200k', k401:'5% match', health:'Full + dental', pto:'Unlimited', tags:['UX research','Prototyping','Enterprise'], desc:'Define the UX vision for Figma\'s collaborative design platform, mentoring a team of designers and partnering with research to deeply understand user needs.' },
  { id:4, company:'Notion', logo:'N', color:'#1A2530', location:'Remote · Worldwide', title:'Product Designer', match:87, salary:'$125k–$155k', k401:'4% match', health:'Full coverage', pto:'Unlimited', tags:['SaaS','Collaboration','Mobile'], desc:'Own design for Notion\'s mobile apps and new AI features. Work in a small, fast-moving team where your work ships to millions of users each week.' },
  { id:5, company:'Vercel', logo:'V', color:'#6FBF8F', location:'Remote · Americas', title:'Design Engineer', match:85, salary:'$140k–$170k', k401:'3% match', health:'Full coverage', pto:'20 days', tags:['React','Design systems','Frontend'], desc:'A hybrid role bridging design and engineering. Build the component library and design system that powers Vercel\'s entire product suite.' },
  { id:6, company:'Loom', logo:'L', color:'#D79A9A', location:'San Francisco, CA · Hybrid', title:'Senior Product Designer', match:83, salary:'$130k–$150k', k401:'4% match', health:'Full coverage', pto:'Unlimited', tags:['Video','Consumer','Growth'], desc:'Design the next generation of async video communication tools. Drive design for Loom\'s core recording and sharing experience.' },
  { id:7, company:'Airtable', logo:'A', color:'#5D7FA3', location:'New York, NY · On-site', title:'UX Designer II', match:80, salary:'$115k–$140k', k401:'3% match', health:'Full + vision', pto:'20 days', tags:['No-code','Enterprise','Databases'], desc:'Help businesses build custom apps without code. You\'ll design powerful but approachable interfaces for Airtable\'s growing enterprise customer base.' },
  { id:8, company:'Miro', logo:'M', color:'#8CB69B', location:'Remote · US/EU', title:'Product Designer', match:78, salary:'$120k–$145k', k401:'4% match', health:'Full coverage', pto:'Unlimited', tags:['Collaboration','Whiteboard','B2B'], desc:'Design the future of visual collaboration. Own key workflows for Miro\'s online whiteboard platform used by over 60 million users globally.' },
  { id:9, company:'Webflow', logo:'W', color:'#2C2C2A', location:'Remote · US only', title:'Senior UX Designer', match:76, salary:'$125k–$155k', k401:'3% match', health:'Full coverage', pto:'25 days', tags:['No-code','Web design','CMS'], desc:'Reimagine how designers build websites without code. Work on Webflow\'s canvas editor and CMS tools that empower a new generation of web creators.' },
  { id:10, company:'Pitch', logo:'P', color:'#6FBF8F', location:'Remote · Worldwide', title:'Product Designer', match:74, salary:'$110k–$135k', k401:'No match', health:'Full coverage', pto:'30 days', tags:['Presentations','Collaboration','Startup'], desc:'Design beautiful presentation software loved by the world\'s best teams. Small team, big impact — your work ships fast and reaches customers immediately.' },
  { id:11, company:'Framer', logo:'F', color:'#D79A9A', location:'Remote · EU/US', title:'UI Designer', match:72, salary:'$100k–$125k', k401:'2% match', health:'Full coverage', pto:'Unlimited', tags:['No-code','Motion','Web'], desc:'Help creators build stunning interactive websites with zero code. Design Framer\'s editing tools and component library with a world-class product team.' },
  { id:12, company:'Craft', logo:'C', color:'#5D7FA3', location:'Remote · US only', title:'Product Designer', match:70, salary:'$105k–$130k', k401:'3% match', health:'Full + dental', pto:'20 days', tags:['Note-taking','iOS','Productivity'], desc:'Design a best-in-class writing and note-taking app for iOS and Mac. Work directly with founders on a product beloved by creative professionals worldwide.' },
];

let deck = [...JOBS];
let applied = 0;
let skipped = 0;
let history = [];
let isDragging = false;
let startX = 0, startY = 0, currentX = 0;
let cardEl, overlayApply, overlaySkip;

function renderCard() {
  if (deck.length === 0) { showEmpty(); return; }
  const job = deck[0];
  cardEl = document.getElementById('swipe-card');
  overlayApply = document.getElementById('overlay-apply');
  overlaySkip = document.getElementById('overlay-skip');

  document.getElementById('card-inner').innerHTML = `
    <div class="card-top">
      <div class="company-row">
        <div class="co-logo" style="background:${job.color}">${job.logo}</div>
        <div>
          <div class="co-name">${job.company}</div>
          <div class="co-location">${job.location}</div>
        </div>
      </div>
      <div class="match-ring">
        <div class="match-pct">${job.match}%</div>
        <div class="match-label">match</div>
      </div>
    </div>
    <div class="job-title">${job.title}</div>
    <div class="job-tags">${job.tags.map(t => `<span class="job-tag">${t}</span>`).join('')}</div>
    <hr class="card-divider">
    <div class="comp-grid">
      <div class="comp-item"><label>Salary</label><span>${job.salary}</span></div>
      <div class="comp-item"><label>401(k)</label><span>${job.k401}</span></div>
      <div class="comp-item"><label>Health</label><span>${job.health}</span></div>
      <div class="comp-item"><label>PTO</label><span>${job.pto}</span></div>
    </div>
    <p class="card-desc">${job.desc}</p>
    <div class="card-actions">
      <button class="action-btn btn-skip" onclick="swipeLeft()">✕ Skip</button>
      <button class="action-btn btn-info" onclick="alert('Full job details coming soon!')">⋯</button>
      <button class="action-btn btn-apply" onclick="swipeRight()">Apply ✓</button>
    </div>
  `;

  cardEl.style.transform = '';
  cardEl.style.opacity = '1';
  overlayApply.style.opacity = '0';
  overlaySkip.style.opacity = '0';
  updateStats();
  setupDrag();
}

function setupDrag() {
  cardEl.addEventListener('mousedown', dragStart);
  cardEl.addEventListener('touchstart', dragStart, { passive: true });
}

function dragStart(e) {
  if (e.target.closest('button')) return;
  isDragging = true;
  startX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
  startY = e.type === 'touchstart' ? e.touches[0].clientY : e.clientY;
  cardEl.style.transition = 'none';
  document.addEventListener('mousemove', dragMove);
  document.addEventListener('mouseup', dragEnd);
  document.addEventListener('touchmove', dragMove, { passive: true });
  document.addEventListener('touchend', dragEnd);
}

function dragMove(e) {
  if (!isDragging) return;
  const x = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
  const y = e.type === 'touchmove' ? e.touches[0].clientY : e.clientY;
  currentX = x - startX;
  const currentY = y - startY;
  const rotate = currentX * 0.08;
  cardEl.style.transform = `translate(${currentX}px, ${currentY * 0.3}px) rotate(${rotate}deg)`;

  const ratio = Math.min(Math.abs(currentX) / 120, 1);
  if (currentX > 20) {
    overlayApply.style.opacity = ratio;
    overlaySkip.style.opacity = '0';
  } else if (currentX < -20) {
    overlaySkip.style.opacity = ratio;
    overlayApply.style.opacity = '0';
  } else {
    overlayApply.style.opacity = '0';
    overlaySkip.style.opacity = '0';
  }
}

function dragEnd() {
  if (!isDragging) return;
  isDragging = false;
  document.removeEventListener('mousemove', dragMove);
  document.removeEventListener('mouseup', dragEnd);
  document.removeEventListener('touchmove', dragMove);
  document.removeEventListener('touchend', dragEnd);

  if (currentX > 100) {
    swipeRight();
  } else if (currentX < -100) {
    swipeLeft();
  } else {
    cardEl.style.transition = 'transform 0.4s cubic-bezier(0.34,1.56,0.64,1)';
    cardEl.style.transform = '';
    overlayApply.style.opacity = '0';
    overlaySkip.style.opacity = '0';
  }
  currentX = 0;
}

function swipeRight() {
  history.push({ job: deck[0], action: 'applied' });
  applied++;
  animateOut('right');
  showToast('Applied to ' + deck[0].company + '!', 'green');
  deck.shift();
  document.getElementById('undo-btn').disabled = false;
  setTimeout(renderCard, 450);
}

function swipeLeft() {
  history.push({ job: deck[0], action: 'skipped' });
  skipped++;
  animateOut('left');
  showToast('Skipped', 'rose');
  deck.shift();
  document.getElementById('undo-btn').disabled = false;
  setTimeout(renderCard, 450);
}

function animateOut(dir) {
  cardEl.classList.add('animating');
  const x = dir === 'right' ? window.innerWidth : -window.innerWidth;
  const rotate = dir === 'right' ? 20 : -20;
  cardEl.style.transform = `translate(${x}px, 30px) rotate(${rotate}deg)`;
  cardEl.style.opacity = '0';
  if (dir === 'right') overlayApply.style.opacity = '1';
  else overlaySkip.style.opacity = '1';
}

function undo() {
  if (history.length === 0) return;
  const last = history.pop();
  if (last.action === 'applied') applied--;
  else skipped++;
  deck.unshift(last.job);
  cardEl.classList.remove('animating');
  renderCard();
  if (history.length === 0) document.getElementById('undo-btn').disabled = true;
  updateStats();
}

function updateStats() {
  document.getElementById('stat-applied').textContent = applied;
  document.getElementById('stat-skipped').textContent = skipped;
  document.getElementById('stat-left').textContent = deck.length;
  document.getElementById('queue-badge').textContent = deck.length + ' match' + (deck.length !== 1 ? 'es' : '');
}

function showEmpty() {
  document.getElementById('deck-area').style.display = 'none';
  document.getElementById('controls-bar').style.display = 'none';
  const empty = document.getElementById('empty-state');
  empty.style.display = 'flex';
  document.getElementById('final-applied').textContent = applied;
  document.getElementById('final-skipped').textContent = skipped;
}

function resetDeck() {
  deck = [...JOBS];
  applied = 0; skipped = 0; history = [];
  document.getElementById('deck-area').style.display = 'block';
  document.getElementById('controls-bar').style.display = 'flex';
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('undo-btn').disabled = true;
  renderCard();
}

function showToast(msg, type) {
  const toast = document.getElementById('toast');
  const dot = document.getElementById('toast-dot');
  document.getElementById('toast-msg').textContent = msg;
  dot.className = 'toast-dot ' + type;
  toast.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => toast.classList.remove('show'), 2200);
}

document.addEventListener('keydown', function(e) {
  if (deck.length === 0) return;
  if (e.key === 'ArrowRight') swipeRight();
  if (e.key === 'ArrowLeft') swipeLeft();
  if (e.key === 'ArrowUp' || e.key === 'z') undo();
});

renderCard();
</script>
</body>
</html>
