<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account - Alygnn</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&display=swap');

:root{
    --brand: #5D7FA3;
    --sage: #8CB69B;
    --bg: #F6F8F7;
    --card-bg: #FCFCFA;
    --text: #1A2530;
    --border: #DDE3E8;
    --mint: #6FBF8F;
    --rose: #D79A9A;
    --text-muted: #4A5968;
}

body{
    margin:0;
    font-family:'DM Sans', sans-serif;
    background:var(--bg);
    color:var(--text);
}

.screen{
    min-height:100vh;
    max-width:500px;
    margin:auto;
    padding:40px 24px;
    display:flex;
    flex-direction:column;
}

.logo{
    font-size:44px;
    font-weight:800;
    color:var(--brand);
    margin-top:30px;
    letter-spacing:-1px;
}

.subtitle{
    font-size:18px;
    color:var(--text-muted);
    line-height:1.6;
    margin-top:12px;
    margin-bottom:36px;
}

.input{
    width:100%;
    box-sizing:border-box;
    padding:18px;
    margin-bottom:16px;
    border-radius:18px;
    border:1px solid var(--border);
    background:var(--card-bg);
    font-size:16px;
    font-family:'DM Sans', sans-serif;
    color:var(--text);
}

.input:focus{
    outline:none;
    border-color:var(--brand);
}

.forgot{
    text-align:right;
    margin-bottom:12px;
}

.forgot a{
    color:var(--brand);
    text-decoration:none;
    font-weight:600;
}

.btn{
    width:100%;
    padding:18px;
    border:none;
    border-radius:20px;
    font-size:17px;
    font-weight:700;
    font-family:'DM Sans', sans-serif;
    cursor:pointer;
    transition:.2s;
    margin-top:10px;
}

.primary{
    background:var(--brand);
    color:white;
}

.primary:hover{
    opacity:.95;
}

.google{
    background:var(--card-bg);
    border:1px solid var(--border);
    color:var(--text);
}

.divider{
    display:flex;
    align-items:center;
    gap:12px;
    margin:28px 0 12px;
    color:var(--text-muted);
}

.divider::before,
.divider::after{
    content:"";
    flex:1;
    height:1px;
    background:var(--border);
}

.link{
    text-align:center;
    margin-top:24px;
    color:var(--brand);
    font-weight:700;
    cursor:pointer;
}

.small{
    margin-top:auto;
    padding-top:30px;
    text-align:center;
    color:var(--text-muted);
    font-size:13px;
    line-height:1.6;
}
</style>}
</head>

<body>

<div class="screen">

    <div class="logo">Alygnn</div>
    <div class="subtitle">
        Create your account and start finding jobs.
    </div>

    <input id="firstName" class="input" placeholder="First Name">
    <input id="lastName" class="input" placeholder="Last Name">
    <input id="email" class="input" type="email" placeholder="Email">
    <input id="password" class="input" type="password" placeholder="Password">

    <button class="btn primary" onclick="signup()">
        Create Account
    </button>

    <div class="divider">or</div>

    <button class="btn google" onclick="googleSignup()">
        Continue with Google
    </button>

    <div class="link" onclick="location.href='app-login.html'">
        Already have an account? Sign In
    </div>

    <div class="small">
        By continuing, you agree to Alygnn's Terms and Privacy Policy.
    </div>

</div>

<script>

const SUPABASE_URL = "https://auth.alygnn.com";
const SUPABASE_KEY = "sb_publishable_3l8krRh6WCyvKfNumWDBDw_C6CKr7rG";

const sb = supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);

async function signup(){

    const firstName = document.getElementById("firstName").value.trim();
    const lastName = document.getElementById("lastName").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    if(!firstName || !lastName || !email || !password){
        alert("Please complete all fields.");
        return;
    }

    const { error } = await sb.auth.signUp({
        email,
        password,
        options:{
            data:{
                first_name:firstName,
                last_name:lastName
            }
        }
    });

    if(error){
        alert(error.message);
        return;
    }

    alert("Account created successfully. Please check your email.");

   window.location.href = "align-upload.html";
}

async function googleSignup(){

    const { error } = await sb.auth.signInWithOAuth({
        provider:"google",
        options:{
            redirectTo:"https://alygnn.com/app-home.html"
        }
    });

    if(error){
        alert(error.message);
    }
}

</script>

</body>
</html>
