<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Alygnn — Applied Jobs</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--brand:#5D7FA3;--bg:#05080D;--card:rgba(18,24,36,.96);--text:#fff;--muted:#A7B0BC;--border:rgba(255,255,255,.12);--mint:#6FBF8F;--rose:#D79A9A;--amber:#E7B86E}
*{box-sizing:border-box;font-family:'DM Sans',Arial,sans-serif!important}html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text)}
body{background:radial-gradient(circle at top,rgba(93,127,163,.27),transparent 35%),linear-gradient(180deg,#05080D,#0A0F17)}
button{font:inherit;cursor:pointer}.app{width:100%;max-width:520px;min-height:100vh;margin:auto;padding:calc(18px + env(safe-area-inset-top)) 20px calc(110px + env(safe-area-inset-bottom))}
.topbar{display:flex;align-items:center;justify-content:space-between}.logo{font-size:28px;font-weight:900;color:var(--brand)}.profile-btn{width:42px;height:42px;border-radius:14px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--text);font-weight:900}
.title{margin-top:28px;font-size:36px;font-weight:900}.subtitle{margin-top:10px;color:var(--muted);font-size:15px;line-height:1.55}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:20px}.stat{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:15px;text-align:center}.stat-number{font-size:24px;font-weight:900}.stat-label{margin-top:4px;color:var(--muted);font-size:11px;font-weight:800}
.tabs{display:flex;gap:9px;overflow-x:auto;margin-top:20px;padding-bottom:8px}.tab{flex:0 0 auto;border:1px solid var(--border);background:rgba(255,255,255,.035);color:var(--muted);padding:10px 14px;border-radius:999px;font-size:13px;font-weight:900}.tab.active{background:var(--brand);border-color:var(--brand);color:white}
.list{display:grid;gap:14px;margin-top:12px}.card{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:19px}.card-top{display:flex;justify-content:space-between;gap:12px}.job-title{font-size:19px;font-weight:900}.company{margin-top:5px;color:var(--muted);font-size:14px}
.status{padding:7px 10px;border-radius:999px;font-size:11px;font-weight:900;height:max-content}.applied{color:var(--brand);background:rgba(93,127,163,.15)}.interview{color:var(--amber);background:rgba(231,184,110,.12)}.offer{color:var(--mint);background:rgba(111,191,143,.12)}.rejected{color:var(--rose);background:rgba(215,154,154,.11)}.withdrawn{color:var(--muted);background:rgba(255,255,255,.05)}
.meta{display:flex;flex-wrap:wrap;gap:8px 12px;margin-top:14px;color:var(--muted);font-size:13px}.match{margin-top:14px;padding:12px 14px;border-radius:16px;background:rgba(111,191,143,.08);color:var(--mint);font-size:13px;font-weight:900}
.actions{display:grid;grid-template-columns:1.3fr 1fr;gap:10px;margin-top:16px}.btn{min-height:48px;border-radius:16px;font-size:14px;font-weight:900}.primary{border:none;background:var(--brand);color:white}.secondary{border:1px solid var(--border);background:transparent;color:var(--text)}
.empty{margin-top:20px;padding:34px 22px;text-align:center;background:var(--card);border:1px solid var(--border);border-radius:26px}.empty-title{font-size:20px;font-weight:900}.empty-copy{margin-top:8px;color:var(--muted);font-size:14px;line-height:1.55}.empty .btn{width:100%;margin-top:18px}
.message{display:none;margin-top:16px;padding:13px 15px;border-radius:16px;font-size:14px;font-weight:800}.message.error{display:block;background:rgba(215,154,154,.12);color:var(--rose)}.loading{text-align:center;color:var(--muted);padding:36px 10px}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;max-width:520px;margin:auto;background:rgba(18,24,36,.98);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:12px 10px calc(18px + env(safe-area-inset-bottom))}.nav-item{color:var(--muted);font-size:13px;font-weight:800}.nav-item.active{color:var(--brand)}
</style>
</head>
<body>
<div class="app">
<div class="topbar"><div class="logo">Alygnn.</div><button class="profile-btn" onclick="location.href='app-account.html'">A</button></div>
<div class="title">Your Applications</div><div class="subtitle">Track every application, interview, and offer in one place.</div>
<div class="stats"><div class="stat"><div id="totalCount" class="stat-number">0</div><div class="stat-label">Total</div></div><div class="stat"><div id="interviewCount" class="stat-number">0</div><div class="stat-label">Interviews</div></div><div class="stat"><div id="offerCount" class="stat-number">0</div><div class="stat-label">Offers</div></div></div>
<div class="tabs"><button class="tab active" onclick="filterApps('all',this)">All</button><button class="tab" onclick="filterApps('applied',this)">Applied</button><button class="tab" onclick="filterApps('interview',this)">Interview</button><button class="tab" onclick="filterApps('offer',this)">Offer</button><button class="tab" onclick="filterApps('rejected',this)">Rejected</button></div>
<div id="message" class="message"></div><div id="content"><div class="loading">Loading your applications...</div></div>
</div>
<div class="bottom-nav"><div class="nav-item" onclick="location.href='app-swipe.html'">Swipe</div><div class="nav-item active">Applied</div><div class="nav-item" onclick="location.href='app-account.html'">My Profile</div></div>
<script>
const sb=supabase.createClient('https://auth.alygnn.com','sb_publishable_3l8krRh6WCyvKfNumWDBDw_C6CKr7rG',{auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:true}});
let apps=[],active='all';
const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));
const fmt=v=>{const d=new Date(v);return isNaN(d)?'Recently':d.toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'})};
function filterApps(s,b){active=s;document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');render()}
function render(){
 const rows=active==='all'?apps:apps.filter(x=>x.status===active);
 document.getElementById('totalCount').textContent=apps.length;
 document.getElementById('interviewCount').textContent=apps.filter(x=>x.status==='interview').length;
 document.getElementById('offerCount').textContent=apps.filter(x=>x.status==='offer').length;
 if(!rows.length){document.getElementById('content').innerHTML=`<div class="empty"><div class="empty-title">No applications yet</div><div class="empty-copy">When you apply to jobs, they will appear here with their latest status.</div><button class="btn primary" onclick="location.href='app-swipe.html'">Find Jobs</button></div>`;return}
 document.getElementById('content').innerHTML=`<div class="list">${rows.map(x=>{const j=x.jobs||{};return `<div class="card"><div class="card-top"><div><div class="job-title">${esc(j.title||'Job Application')}</div><div class="company">${esc(j.company_name||j.company||'Employer')}</div></div><div class="status ${x.status}">${esc(x.status[0].toUpperCase()+x.status.slice(1))}</div></div><div class="meta"><span>${esc(j.location||'')}</span><span>Applied ${esc(fmt(x.applied_at))}</span></div>${x.match_score!=null?`<div class="match">${esc(x.match_score)}% Match</div>`:''}<div class="actions"><button class="btn primary" onclick="location.href='app-job-details.html?id=${encodeURIComponent(j.id||x.job_id)}'">View Job</button><button class="btn secondary" onclick="location.href='app-application-details.html?id=${encodeURIComponent(x.id)}'">Details</button></div></div>`}).join('')}</div>`;
}
(async()=>{
 const{data,error}=await sb.auth.getSession();if(error||!data.session){location.replace('app-login.html');return}
 const{data:rows,error:e}=await sb.from('applications').select('id,job_id,status,applied_at,match_score,jobs(id,title,company_name,company,location)').eq('candidate_id',data.session.user.id).order('applied_at',{ascending:false});
 if(e){console.error(e);document.getElementById('message').textContent=e.message||'Applications could not be loaded.';document.getElementById('message').className='message error';apps=[];render();return}
 apps=(rows||[]).map(x=>({...x,status:String(x.status||'applied').toLowerCase()}));render();
})();
</script>
</body>
</html>
