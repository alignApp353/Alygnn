<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#F6F8F7">
<title>Welcome to Alygnn</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'DM Sans',Arial,sans-serif!important}
:root{--brand:#5D7FA3;--brand-dark:#345F91;--sage:#8CB69B;--bg:#F6F8F7;--text:#172333;--muted:#59697A;--border:#DDE3E8;--candidate:#23A968;--employer:#3568C0}
html,body{width:100%;min-height:100%}
body{min-height:100vh;background:radial-gradient(circle at 15% 10%,rgba(140,182,155,.15),transparent 28%),radial-gradient(circle at 90% 80%,rgba(93,127,163,.14),transparent 30%),var(--bg);color:var(--text);overflow-x:hidden}
button,a{font:inherit}
.page{width:100%;max-width:520px;min-height:100vh;margin:0 auto;padding:calc(36px + env(safe-area-inset-top)) 20px calc(28px + env(safe-area-inset-bottom));display:flex;flex-direction:column}
.brand{text-align:center;font-family:'DM Serif Display',Georgia,serif!important;font-size:43px;line-height:1;color:var(--brand);letter-spacing:-.6px}
.brand span{color:var(--sage)}
.hero{margin-top:72px;text-align:center}
.hero h1{font-size:30px;line-height:1.12;letter-spacing:-.6px;font-weight:900}
.hero p{margin-top:12px;color:var(--muted);font-size:15px;line-height:1.5}
.choices{margin-top:38px;display:grid;gap:16px}
.choice{width:100%;min-height:142px;border:1px solid var(--border);border-radius:25px;padding:20px;display:grid;grid-template-columns:62px 1fr 43px;align-items:center;gap:15px;text-align:left;background:#fff;box-shadow:0 11px 30px rgba(23,35,51,.055);transition:transform .18s ease,box-shadow .18s ease,opacity .18s ease;cursor:pointer}
.choice:active{transform:scale(.975)}
.choice.selected{transform:scale(1.018);box-shadow:0 17px 40px rgba(23,35,51,.11)}
.choice.faded{opacity:.28;transform:scale(.97)}
.choice.candidate{background:linear-gradient(120deg,rgba(235,248,241,.96),rgba(255,255,255,.98))}
.choice.employer{background:linear-gradient(120deg,rgba(237,243,252,.98),rgba(255,255,255,.98))}
.choice-icon{width:62px;height:62px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.candidate .choice-icon{background:#DDF4E8;color:var(--candidate)}
.employer .choice-icon{background:#DFEAFB;color:var(--employer)}
.choice-icon svg{width:30px;height:30px}
.choice-title{font-size:18px;font-weight:900;line-height:1.25;letter-spacing:-.2px}
.choice-copy{margin-top:7px;color:var(--muted);font-size:13px;line-height:1.5}
.arrow{width:43px;height:43px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:25px;font-weight:800}
.candidate .arrow{background:var(--candidate)}
.employer .arrow{background:var(--employer)}
.footer{margin-top:auto;padding-top:42px;text-align:center;color:var(--muted);font-size:14px}
.sign-in-link{border:none;background:transparent;color:var(--brand-dark);font-weight:900;cursor:pointer}
.small-note{margin-top:17px;font-size:11px;color:#84909D;line-height:1.5}
.transition-screen{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;flex-direction:column;background:rgba(246,248,247,.98);opacity:0;pointer-events:none;transition:opacity .22s ease}
.transition-screen.show{opacity:1;pointer-events:auto}
.transition-icon{width:76px;height:76px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:18px}
.transition-icon.candidate{color:var(--candidate);background:#DDF4E8}
.transition-icon.employer{color:var(--employer);background:#DFEAFB}
.transition-icon svg{width:38px;height:38px}
.transition-title{font-size:23px;font-weight:900}
.transition-copy{margin-top:7px;color:var(--muted);font-size:13px}
@media(max-height:720px){.hero{margin-top:42px}.choices{margin-top:25px}.choice{min-height:125px}.footer{padding-top:25px}}
@media(max-width:360px){.page{padding-left:14px;padding-right:14px}.choice{grid-template-columns:54px 1fr 38px;padding:16px;gap:12px}.choice-icon{width:54px;height:54px}.arrow{width:38px;height:38px}}
</style>
</head>
<body>
<main class="page">
  <div class="brand">Alygnn<span>.</span></div>
  <section class="hero">
    <h1>What brings you to Alygnn today?</h1>
    <p>Choose the experience that best fits what you’re here to accomplish.</p>
  </section>
  <section class="choices">
    <button class="choice candidate" id="candidate-choice" type="button">
      <div class="choice-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"></circle><path d="M4.5 21c.7-4.1 3.2-6.2 7.5-6.2s6.8 2.1 7.5 6.2"></path></svg>
      </div>
      <div><div class="choice-title">Find Your Next Opportunity</div><div class="choice-copy">Discover matched jobs, explore employers, and apply in seconds.</div></div>
      <div class="arrow" aria-hidden="true">→</div>
    </button>
    <button class="choice employer" id="employer-choice" type="button">
      <div class="choice-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="7" width="18" height="13" rx="2"></rect><path d="M9 7V5.5A1.5 1.5 0 0 1 10.5 4h3A1.5 1.5 0 0 1 15 5.5V7"></path><path d="M3 12h18"></path><path d="M10 12v2h4v-2"></path></svg>
      </div>
      <div><div class="choice-title">Hire Top Talent</div><div class="choice-copy">Post jobs, review qualified candidates, and build your team faster.</div></div>
      <div class="arrow" aria-hidden="true">→</div>
    </button>
  </section>
  <footer class="footer">
    Already have an account? <button class="sign-in-link" id="sign-in-link" type="button">Sign in</button>
    <div class="small-note">You can switch between candidate and employer experiences at any time.</div>
  </footer>
</main>
<div class="transition-screen" id="transition-screen">
  <div class="transition-icon" id="transition-icon"></div>
  <div class="transition-title" id="transition-title">Opening Alygnn</div>
  <div class="transition-copy">Preparing your experience…</div>
</div>
<script>
const candidateChoice=document.getElementById('candidate-choice');
const employerChoice=document.getElementById('employer-choice');
const transitionScreen=document.getElementById('transition-screen');
const transitionIcon=document.getElementById('transition-icon');
const transitionTitle=document.getElementById('transition-title');
const icons={candidate:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"></circle><path d="M4.5 21c.7-4.1 3.2-6.2 7.5-6.2s6.8 2.1 7.5 6.2"></path></svg>`,employer:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="7" width="18" height="13" rx="2"></rect><path d="M9 7V5.5A1.5 1.5 0 0 1 10.5 4h3A1.5 1.5 0 0 1 15 5.5V7"></path><path d="M3 12h18"></path><path d="M10 12v2h4v-2"></path></svg>`};
function chooseExperience(type){
  const selected=type==='candidate'?candidateChoice:employerChoice;
  const other=type==='candidate'?employerChoice:candidateChoice;
  selected.classList.add('selected');
  other.classList.add('faded');
  localStorage.setItem('alygnn_account_type',type);
  setTimeout(()=>{transitionIcon.className='transition-icon '+type;transitionIcon.innerHTML=icons[type];transitionTitle.textContent=type==='candidate'?'Opening candidate login':'Opening employer login';transitionScreen.classList.add('show')},180);
  setTimeout(()=>{window.location.href=type==='candidate'?'app-login.html':'app-employer-login.html'},650);
}
candidateChoice.addEventListener('click',()=>chooseExperience('candidate'));
employerChoice.addEventListener('click',()=>chooseExperience('employer'));
document.getElementById('sign-in-link').addEventListener('click',()=>{const savedType=localStorage.getItem('alygnn_account_type');chooseExperience(savedType==='employer'?'employer':'candidate')});
</script>
</body>
</html>
