<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alygnn — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --brand: #5D7FA3; --sage: #8CB69B; --bg: #F0F3F2;
    --card-bg: #FCFCFA; --text: #1A2530; --border: #DDE3E8;
    --mint: #6FBF8F; --text-muted: #4A5968;
    --brand-light: rgba(93,127,163,0.08);
  }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; flex-direction: column;
  }
  nav {
    background: rgba(246,248,247,0.95); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 5%; display: flex; align-items: center;
    justify-content: space-between; height: 64px;
  }
  .logo { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--brand); letter-spacing: -0.5px; text-decoration: none; }
  .logo span { color: var(--sage); }

  .page { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }

  .card {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 24px; padding: 48px;
    width: 100%; max-width: 440px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.08);
    animation: fadeUp 0.5s ease both;
  }

  .card-header { text-align: center; margin-bottom: 36px; }
  .card-icon { font-size: 36px; margin-bottom: 12px; }
  .card-title { font-family: 'DM Serif Display', serif; font-size: 28px; color: var(--text); letter-spacing: -0.5px; margin-bottom: 6px; }
  .card-sub { font-size: 14px; color: var(--text-muted); line-height: 1.5; }

  /* ROLE PICKER */
  .role-picker { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 28px; }
  .role-card {
    border: 2px solid var(--border); border-radius: 16px;
    padding: 20px 16px; text-align: center; cursor: pointer;
    transition: all 0.2s; background: white;
  }
  .role-card:hover { border-color: var(--brand); }
  .role-card.active { border-color: var(--brand); background: var(--brand-light); }
  .role-card.active .role-title { color: var(--brand); }
  .role-icon { font-size: 28px; margin-bottom: 8px; }
  .role-title { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 3px; }
  .role-sub { font-size: 11px; color: var(--text-muted); }

  .divider { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .divider-line { flex: 1; height: 1px; background: var(--border); }
  .divider-text { font-size: 12px; color: var(--text-muted); }

  .input-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
  .input-label { font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-muted); font-weight: 500; }
  .input-field {
    background: white; border: 1.5px solid var(--border);
    border-radius: 12px; padding: 13px 16px;
    font-size: 14px; font-family: 'DM Sans', sans-serif;
    color: var(--text); outline: none; transition: border-color 0.2s; width: 100%;
  }
  .input-field:focus { border-color: var(--brand); }
  .input-field::placeholder { color: #aab4bc; }

  .btn-login {
    width: 100%; background: var(--brand); color: white;
    border: none; border-radius: 12px;
    padding: 14px; font-size: 15px; font-weight: 500;
    font-family: 'DM Sans', sans-serif; cursor: pointer;
    transition: all 0.2s; margin-top: 8px;
  }
  .btn-login:hover { opacity: 0.88; transform: translateY(-1px); }

  .switch-text { text-align: center; font-size: 13px; color: var(--text-muted); margin-top: 20px; }
  .switch-text a { color: var(--brand); text-decoration: none; font-weight: 500; }
  .switch-text a:hover { text-decoration: underline; }

  .demo-note {
    background: var(--brand-light); border: 1px solid rgba(93,127,163,0.2);
    border-radius: 10px; padding: 12px 14px;
    font-size: 12px; color: var(--text-muted); margin-top: 16px;
    line-height: 1.5; text-align: center;
  }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<nav>
  <a href="index.html" class="logo">Alygnn<span>.</span></a>
</nav>

<div class="page">
  <div class="card">
    <div class="card-header">
      <div class="card-icon">👋</div>
      <div class="card-title">Welcome back</div>
      <div class="card-sub">Sign in to your Alygnn account</div>
    </div>

    <!-- ROLE PICKER -->
    <div class="role-picker">
      <div class="role-card active" id="role-seeker" onclick="selectRole('seeker')">
        <div class="role-icon">🧑‍💼</div>
        <div class="role-title">Job Seeker</div>
        <div class="role-sub">Find your next role</div>
      </div>
      <div class="role-card" id="role-employer" onclick="selectRole('employer')">
        <div class="role-icon">🏢</div>
        <div class="role-title">Employer</div>
        <div class="role-sub">Post jobs & find talent</div>
      </div>
    </div>

    <div class="input-group">
      <label class="input-label">Email</label>
      <input type="email" class="input-field" id="email-input" placeholder="you@example.com">
    </div>
    <div class="input-group">
      <label class="input-label">Password</label>
      <input type="password" class="input-field" id="password-input" placeholder="••••••••">
    </div>

    <button class="btn-login" onclick="handleLogin()">Sign in →</button>

    <div class="switch-text">
      Don't have an account? <a href="signup.html">Create one</a>
    </div>

    <div class="demo-note">
      🔑 Demo mode — any email & password will work
    </div>
  </div>
</div>

<script>
  let selectedRole = 'seeker';

  function selectRole(role) {
    selectedRole = role;
    document.getElementById('role-seeker').classList.toggle('active', role === 'seeker');
    document.getElementById('role-employer').classList.toggle('active', role === 'employer');
  }

  function handleLogin() {
    const email = document.getElementById('email-input').value.trim();
    const password = document.getElementById('password-input').value;

    if (!email || !password) {
      alert('Please enter your email and password.');
      return;
    }

    // Save session
    sessionStorage.setItem('user', JSON.stringify({ email, role: selectedRole }));

    // Route based on role
    if (selectedRole === 'employer') {
      window.location.href = 'employer-dashboard.html';
    } else {
      window.location.href = 'preferences.html';
    }
  }

  // Allow Enter key
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') handleLogin();
  });
</script>
</body>
</html>
