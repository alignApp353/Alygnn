<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alygnn — Swipe Jobs</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;700;800&display=swap" rel="stylesheet">

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:'DM Sans',Arial,sans-serif!important;
}

:root{
  --brand:#5D7FA3;
  --brand-dark:#345F91;
  --sage:#8CB69B;
  --bg:#F6F8F7;
  --card-bg:#FFFFFF;
  --text:#172333;
  --border:#DDE3E8;
  --mint:#6FBF8F;
  --rose:#D79A9A;
  --text-muted:#56677B;
  --brand-light:rgba(93,127,163,.10);
  --mint-light:rgba(111,191,143,.15);
  --rose-light:rgba(215,154,154,.16);
}

html,body{
  width:100%;
  min-height:100%;
}

body{
  background:
    radial-gradient(circle at top,rgba(93,127,163,.09),transparent 30%),
    var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow:hidden;
}

/* HEADER */
.top-header{
  min-height:112px;
  padding:calc(14px + env(safe-area-inset-top)) 18px 14px;
  display:grid;
  grid-template-columns:92px 1fr 92px;
  align-items:center;
  background:rgba(246,248,247,.96);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(16px);
}

.back-btn{
  min-height:44px;
  border:none;
  border-radius:999px;
  background:rgba(93,127,163,.09);
  color:var(--text);
  padding:0 15px;
  font-size:14px;
  font-weight:800;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:7px;
  cursor:pointer;
}

.brand-block{
  text-align:center;
}

.logo{
  font-family:'DM Serif Display',Georgia,serif!important;
  font-size:31px;
  line-height:1;
  color:var(--brand);
}

.logo span{
  color:var(--sage);
}

.tagline{
  margin-top:5px;
  font-size:11px;
  color:var(--text-muted);
  font-weight:600;
}

.profile-chip{
  justify-self:end;
  width:46px;
  height:46px;
  border:none;
  border-radius:50%;
  background:linear-gradient(145deg,var(--brand),#6E95BE);
  color:#fff;
  font-size:14px;
  font-weight:900;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* PROGRESS */
.progress-shell{
  padding:12px 18px 0;
}

.progress-card{
  max-width:430px;
  margin:0 auto;
  background:rgba(255,255,255,.88);
  border:1px solid var(--border);
  border-radius:20px;
  padding:12px 14px;
  display:grid;
  grid-template-columns:repeat(3,1fr) 1.4fr;
  gap:8px;
  align-items:center;
  box-shadow:0 8px 22px rgba(25,40,60,.05);
}

.stat{
  text-align:center;
}

.stat-val{
  font-size:18px;
  font-weight:900;
  color:var(--text);
}

.stat-label{
  margin-top:2px;
  font-size:9px;
  color:var(--text-muted);
  text-transform:uppercase;
  letter-spacing:.8px;
  font-weight:800;
}

.job-progress{
  border-left:1px solid var(--border);
  padding-left:12px;
}

.progress-copy{
  font-size:11px;
  font-weight:800;
  color:var(--text);
  text-align:center;
  margin-bottom:6px;
}

.progress-track{
  width:100%;
  height:7px;
  background:#E8EDF2;
  border-radius:999px;
  overflow:hidden;
}

.progress-fill{
  height:100%;
  width:0;
  background:var(--brand);
  border-radius:inherit;
  transition:width .25s ease;
}

/* MAIN */
.swipe-area{
  height:calc(100vh - 112px - 84px);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:14px 18px calc(92px + env(safe-area-inset-bottom));
}

.card-stack{
  position:relative;
  width:100%;
  max-width:430px;
  height:min(525px,calc(100vh - 305px));
}

.job-card{
  position:absolute;
  inset:0;
  background:var(--card-bg);
  border:1px solid var(--border);
  border-radius:28px;
  padding:23px;
  box-shadow:0 18px 45px rgba(27,43,63,.10);
  display:flex;
  flex-direction:column;
  cursor:grab;
  user-select:none;
  touch-action:none;
  transform-origin:center bottom;
}

.job-card:nth-child(2){
  transform:scale(.97) translateY(10px);
  z-index:1;
}

.job-card:nth-child(3){
  transform:scale(.94) translateY(20px);
  z-index:0;
}

.job-card:first-child{
  z-index:2;
}

.job-card.is-dragging{
  transition:none;
  box-shadow:0 22px 55px rgba(27,43,63,.17);
}

.job-card.swipe-left{animation:swipeLeft .35s ease forwards}
.job-card.swipe-right{animation:swipeRight .35s ease forwards}

.stamp{
  position:absolute;
  top:24px;
  padding:7px 16px;
  border-radius:10px;
  font-size:19px;
  font-weight:900;
  letter-spacing:2px;
  opacity:0;
  border:3px solid;
  pointer-events:none;
}

.stamp-apply{
  right:24px;
  color:var(--mint);
  border-color:var(--mint);
  transform:rotate(12deg);
}

.stamp-skip{
  left:24px;
  color:var(--rose);
  border-color:var(--rose);
  transform:rotate(-12deg);
}

.card-toolbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:18px;
}

.match{
  display:inline-flex;
  align-items:center;
  gap:7px;
  width:max-content;
  background:#E8F5EC;
  color:#257B52;
  padding:8px 14px;
  border-radius:999px;
  font-size:13px;
  font-weight:900;
}

.save-btn{
  border:none;
  background:transparent;
  color:var(--text);
  font-size:22px;
  padding:6px;
}

.card-top{
  display:flex;
  gap:15px;
  margin-bottom:18px;
  align-items:flex-start;
}

.company-logo{
  width:58px;
  height:58px;
  border-radius:18px;
  background:linear-gradient(145deg,#F1F4F7,#E7EDF2);
  border:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:21px;
  flex-shrink:0;
}

.job-title{
  font-family:'DM Serif Display',Georgia,serif!important;
  font-size:29px;
  line-height:1.05;
  color:var(--text);
  text-transform:none;
}

.company-line{
  display:flex;
  align-items:center;
  gap:7px;
  margin-top:6px;
}

.company-name{
  font-size:15px;
  color:var(--text-muted);
}

.verified{
  width:17px;
  height:17px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:var(--brand);
  color:white;
  font-size:10px;
  font-weight:900;
}

.card-pills{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-bottom:17px;
}

.pill{
  font-size:12px;
  padding:7px 11px;
  border-radius:999px;
  border:1px solid var(--border);
  color:var(--text-muted);
  background:#FBFCFD;
  font-weight:700;
}

.salary{
  background:var(--brand-light);
  color:var(--brand-dark);
}

.card-desc{
  font-size:14px;
  color:var(--text-muted);
  line-height:1.6;
  flex:1;
  overflow:hidden;
  display:-webkit-box;
  -webkit-box-orient:vertical;
  -webkit-line-clamp:7;
}

.card-bottom{
  border-top:1px solid var(--border);
  padding-top:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:17px;
}

.posted-time{
  font-size:12px;
  color:var(--text-muted);
}

.apply-link{
  color:var(--brand-dark);
  text-decoration:none;
  font-size:13px;
  font-weight:900;
}

/* ACTIONS */
.action-buttons{
  display:flex;
  align-items:flex-end;
  gap:22px;
  margin-top:20px;
}

.action-wrap{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;
}

.action-label{
  font-size:11px;
  color:var(--text-muted);
  font-weight:800;
}

.action-btn{
  border:none;
  border-radius:50%;
  background:white;
  border:1.5px solid var(--border);
  box-shadow:0 5px 16px rgba(27,43,63,.10);
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
}

.btn-undo{
  width:48px;
  height:48px;
  font-size:19px;
  color:var(--text);
}

.btn-skip{
  width:60px;
  height:60px;
  font-size:27px;
  color:#D25B67;
}

.btn-apply{
  width:70px;
  height:70px;
  font-size:31px;
  background:var(--brand);
  color:white;
  border:none;
}

/* BOTTOM NAV */
.bottom-nav{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  max-width:520px;
  margin:0 auto;
  min-height:72px;
  padding:10px 12px calc(13px + env(safe-area-inset-bottom));
  background:rgba(255,255,255,.96);
  border-top:1px solid var(--border);
  display:grid;
  grid-template-columns:repeat(4,1fr);
  z-index:50;
  backdrop-filter:blur(16px);
}

.nav-link{
  border:none;
  background:transparent;
  color:var(--text-muted);
  font-size:11px;
  font-weight:800;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:4px;
}

.nav-icon{
  font-size:19px;
  line-height:1;
}

.nav-link.active{
  color:var(--brand-dark);
}

/* EMPTY + TOAST */
.empty-screen{
  display:none;
  height:calc(100vh - 112px);
  align-items:center;
  justify-content:center;
  flex-direction:column;
  text-align:center;
  padding:30px;
}

.empty-title{
  font-family:'DM Serif Display',Georgia,serif!important;
  font-size:32px;
  margin-bottom:10px;
}

.empty-sub{
  color:var(--text-muted);
  line-height:1.6;
  max-width:320px;
}

.toast{
  position:fixed;
  bottom:92px;
  left:50%;
  transform:translateX(-50%) translateY(80px);
  background:var(--text);
  color:white;
  padding:12px 22px;
  border-radius:999px;
  font-size:14px;
  transition:.3s;
  z-index:100;
}

.toast.show{
  transform:translateX(-50%) translateY(0);
}

@keyframes swipeLeft{
  to{transform:translateX(-130%) rotate(-22deg);opacity:0}
}

@keyframes swipeRight{
  to{transform:translateX(130%) rotate(22deg);opacity:0}
}

@media(max-height:760px){
  .top-header{min-height:96px;padding-top:calc(9px + env(safe-area-inset-top))}
  .logo{font-size:27px}
  .tagline{display:none}
  .progress-shell{padding-top:7px}
  .progress-card{padding:9px 12px}
  .swipe-area{height:calc(100vh - 96px - 72px);padding-top:9px}
  .card-stack{height:min(470px,calc(100vh - 270px))}
  .job-card{padding:19px}
  .job-title{font-size:25px}
  .card-desc{-webkit-line-clamp:5}
  .action-buttons{margin-top:13px}
}
</style>
</head>

<body>
<header class="top-header">
  <button class="back-btn" id="back-button" type="button">
    <span aria-hidden="true">←</span>
    <span>Back</span>
  </button>

  <div class="brand-block">
    <div class="logo">Alygnn<span>.</span></div>
    <div class="tagline">Get better job matches.</div>
  </div>

  <button class="profile-chip" id="profile-button" type="button" aria-label="Open profile">JE</button>
</header>

<section class="progress-shell">
  <div class="progress-card">
    <div class="stat">
      <div class="stat-val" id="stat-applied">0</div>
      <div class="stat-label">Applied</div>
    </div>

    <div class="stat">
      <div class="stat-val" id="stat-skipped">0</div>
      <div class="stat-label">Passed</div>
    </div>

    <div class="stat">
      <div class="stat-val" id="stat-remaining">0</div>
      <div class="stat-label">Left</div>
    </div>

    <div class="job-progress">
      <div class="progress-copy" id="job-progress-copy">Job 0 of 0</div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </div>
  </div>
</section>

<main class="swipe-area" id="swipe-area">
  <div class="card-stack" id="card-stack"></div>

  <div class="action-buttons">
    <div class="action-wrap">
      <button class="action-btn btn-undo" id="undo-button" type="button" aria-label="Undo last swipe">↩</button>
      <div class="action-label">Undo</div>
    </div>

    <div class="action-wrap">
      <button class="action-btn btn-skip" id="skip-button" type="button" aria-label="Pass on job">✕</button>
      <div class="action-label">Pass</div>
    </div>

    <div class="action-wrap">
      <button class="action-btn btn-apply" id="apply-button" type="button" aria-label="Apply to job">✓</button>
      <div class="action-label">Apply</div>
    </div>
  </div>
</main>

<section class="empty-screen" id="empty-screen">
  <div class="empty-title">You're all caught up</div>
  <div class="empty-sub">
    You went through all your matches. More jobs will appear as Alygnn finds better fits for you.
  </div>
</section>

<nav class="bottom-nav" aria-label="Main navigation">
  <button class="nav-link" id="home-nav" type="button">
    <span class="nav-icon">⌂</span>
    <span>Home</span>
  </button>

  <button class="nav-link active" type="button">
    <span class="nav-icon">▱</span>
    <span>Swipe Jobs</span>
  </button>

  <button class="nav-link" id="saved-nav" type="button">
    <span class="nav-icon">♡</span>
    <span>Applied</span>
  </button>

  <button class="nav-link" id="profile-nav" type="button">
    <span class="nav-icon">◯</span>
    <span>Profile</span>
  </button>
</nav>

<div class="toast" id="toast"></div>

<script>
const sb=supabase.createClient(
  'https://auth.alygnn.com',
  'sb_publishable_3l8krRh6WCyvKfNumWDBDw_C6CKr7rG',
  {auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:true}}
);

let session=null;
let jobs=[];
let currentIndex=0;
let applied=0;
let skipped=0;
let history=[];
let activeCard=null;
let isDragging=false;
let startX=0;
let startY=0;
let currentX=0;
let activePointerId=null;
let toastTimer;

function escapeHtml(value){
  return String(value??'').replace(/[&<>"']/g,c=>({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'
  })[c]);
}

function initials(value){
  const parts=String(value||'A').trim().split(/\s+/).filter(Boolean);
  return ((parts[0]?.[0]||'A')+(parts[1]?.[0]||'')).toUpperCase();
}

function salaryText(job){
  if(job.salary)return job.salary;
  if(job.salary_min&&job.salary_max){
    return '$'+Number(job.salary_min).toLocaleString()+'–$'+Number(job.salary_max).toLocaleString();
  }
  if(job.salary_min)return 'From $'+Number(job.salary_min).toLocaleString();
  if(job.salary_max)return 'Up to $'+Number(job.salary_max).toLocaleString();
  return 'Salary not listed';
}

function postedText(value){
  if(!value)return 'Recently posted';
  const date=new Date(value);
  if(Number.isNaN(date.getTime()))return 'Recently posted';
  const days=Math.floor((Date.now()-date.getTime())/86400000);
  if(days<=0)return 'Today';
  if(days===1)return '1 day ago';
  return days+' days ago';
}

function buildCard(job,index){
  const card=document.createElement('div');
  card.className='job-card';
  card.dataset.index=index;

  const company=job.company||job.company_name||'Employer';
  const location=job.location||[job.city,job.state].filter(Boolean).join(', ')||'Location not listed';
  const type=job.job_type||job.employment_type||'Job';
  const style=job.work_style||'';
  const match=job.match_score!=null?job.match_score+'% Match':'New Match';

  card.innerHTML=`
    <div class="stamp stamp-apply">APPLY</div>
    <div class="stamp stamp-skip">PASS</div>

    <div class="card-toolbar">
      <div class="match">★ ${escapeHtml(match)}</div>
      <button class="save-btn" type="button" aria-label="Save job">♡</button>
    </div>

    <div class="card-top">
      <div class="company-logo">${escapeHtml(initials(company))}</div>
      <div>
        <div class="job-title">${escapeHtml(job.title||'Job Opportunity')}</div>
        <div class="company-line">
          <div class="company-name">${escapeHtml(company)}</div>
          <div class="verified" title="Verified employer">✓</div>
        </div>
      </div>
    </div>

    <div class="card-pills">
      <span class="pill">⌖ ${escapeHtml(location)}</span>
      <span class="pill">▣ ${escapeHtml(type)}</span>
      ${style?`<span class="pill">⌂ ${escapeHtml(style)}</span>`:''}
      <span class="pill salary">$ ${escapeHtml(salaryText(job))}</span>
    </div>

    <div class="card-desc">${escapeHtml(job.description||'Open this job to see the full details and requirements.')}</div>

    <div class="card-bottom">
      <div class="posted-time">${escapeHtml(postedText(job.created_at))}</div>
      <a href="app-job-details.html?id=${encodeURIComponent(job.id)}" class="apply-link">View details →</a>
    </div>
  `;

  setupDrag(card);
  return card;
}

function renderCards(){
  const stack=document.getElementById('card-stack');
  stack.innerHTML='';

  const remaining=jobs.slice(currentIndex,currentIndex+3);

  if(!remaining.length){
    document.getElementById('swipe-area').style.display='none';
    document.getElementById('empty-screen').style.display='flex';
    updateStats();
    return;
  }

  document.getElementById('swipe-area').style.display='flex';
  document.getElementById('empty-screen').style.display='none';

  remaining.forEach((job,i)=>{
    stack.appendChild(buildCard(job,currentIndex+i));
  });

  updateStats();
  setupTopCard();
}

function setupTopCard(){
  activeCard=document.querySelector('.job-card:first-child');
}

function setupDrag(card){
  card.addEventListener('pointerdown',dragStart,{passive:false});
}

function dragStart(e){
  setupTopCard();
  if(!activeCard||activeCard!==e.currentTarget)return;
  if(e.target.closest('.apply-link'))return;

  e.preventDefault();
  isDragging=true;
  activePointerId=e.pointerId;
  startX=e.clientX;
  startY=e.clientY;
  currentX=0;

  activeCard.classList.add('is-dragging');
  activeCard.style.transition='none';

  try{activeCard.setPointerCapture(e.pointerId)}catch(_){}

  activeCard.addEventListener('pointermove',dragMove,{passive:false});
  activeCard.addEventListener('pointerup',dragEnd);
  activeCard.addEventListener('pointercancel',dragEnd);
}

function dragMove(e){
  if(!isDragging||!activeCard)return;
  if(activePointerId!==null&&e.pointerId!==activePointerId)return;

  e.preventDefault();

  currentX=e.clientX-startX;
  const currentY=e.clientY-startY;
  const rotate=currentX*.08;

  activeCard.style.transform=`translate(${currentX}px,${currentY*.25}px) rotate(${rotate}deg)`;

  const applyStamp=activeCard.querySelector('.stamp-apply');
  const skipStamp=activeCard.querySelector('.stamp-skip');
  const ratio=Math.min(Math.abs(currentX)/80,1);

  if(currentX>20){
    applyStamp.style.opacity=ratio;
    skipStamp.style.opacity=0;
  }else if(currentX<-20){
    skipStamp.style.opacity=ratio;
    applyStamp.style.opacity=0;
  }else{
    applyStamp.style.opacity=0;
    skipStamp.style.opacity=0;
  }
}

function dragEnd(){
  if(!isDragging||!activeCard)return;

  isDragging=false;
  activePointerId=null;

  activeCard.removeEventListener('pointermove',dragMove);
  activeCard.removeEventListener('pointerup',dragEnd);
  activeCard.removeEventListener('pointercancel',dragEnd);
  activeCard.classList.remove('is-dragging');

  if(currentX>70){
    animateSwipe('right');
  }else if(currentX<-70){
    animateSwipe('left');
  }else{
    activeCard.style.transition='transform .25s ease';
    activeCard.style.transform='';
  }
}

async function createApplication(job){
  const {data:existing,error:checkError}=await sb
    .from('applications')
    .select('id')
    .eq('candidate_id',session.user.id)
    .eq('job_id',job.id)
    .maybeSingle();

  if(checkError)console.warn(checkError);
  if(existing)return true;

  const {error}=await sb.from('applications').insert({
    candidate_id:session.user.id,
    job_id:job.id,
    status:'applied',
    applied_at:new Date().toISOString(),
    match_score:job.match_score??null
  });

  if(error)throw error;
  return false;
}

async function animateSwipe(direction){
  setupTopCard();
  if(!activeCard)return;

  const job=jobs[Number(activeCard.dataset.index)];
  activeCard.classList.add(direction==='right'?'swipe-right':'swipe-left');

  history.push({job,direction,index:currentIndex});

  if(direction==='right'){
    try{
      const alreadyExists=await createApplication(job);
      applied++;
      showToast(alreadyExists?'Already applied':'Application submitted');
    }catch(error){
      console.error(error);
      showToast(error.message||'Could not apply');
    }
  }else{
    skipped++;
    showToast('Passed');
  }

  currentIndex++;

  setTimeout(renderCards,350);
}

function skipCurrent(){
  setupTopCard();
  if(activeCard)animateSwipe('left');
}

function applyCurrent(){
  setupTopCard();
  if(activeCard)animateSwipe('right');
}

function undo(){
  if(!history.length){
    showToast('Nothing to undo');
    return;
  }

  const last=history.pop();

  if(last.direction==='right'){
    applied=Math.max(0,applied-1);
  }else{
    skipped=Math.max(0,skipped-1);
  }

  currentIndex=last.index;
  renderCards();
  showToast('Undone');
}

function updateStats(){
  const remaining=Math.max(0,jobs.length-currentIndex);
  const position=jobs.length?Math.min(currentIndex+1,jobs.length):0;
  const completed=jobs.length?Math.min(currentIndex,jobs.length):0;
  const progress=jobs.length?(completed/jobs.length)*100:0;

  document.getElementById('stat-applied').textContent=applied;
  document.getElementById('stat-skipped').textContent=skipped;
  document.getElementById('stat-remaining').textContent=remaining;
  document.getElementById('job-progress-copy').textContent=`Job ${position} of ${jobs.length}`;
  document.getElementById('progress-fill').style.width=progress+'%';
}

function showToast(message){
  const toast=document.getElementById('toast');
  toast.textContent=message;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>toast.classList.remove('show'),1800);
}

async function loadJobs(){
  const {data,error}=await sb
    .from('jobs')
    .select('*')
    .eq('status','active')
    .order('created_at',{ascending:false});

  if(error){
    console.error(error);
    showToast(error.message||'Could not load jobs');
    jobs=[];
    renderCards();
    return;
  }

  jobs=data||[];
  currentIndex=0;
  history=[];
  renderCards();
}

document.addEventListener('click',event=>{
  const saveButton=event.target.closest('.save-btn');
  if(!saveButton)return;
  event.stopPropagation();
  saveButton.textContent=saveButton.textContent==='♡'?'♥':'♡';
  showToast(saveButton.textContent==='♥'?'Job saved':'Removed from saved');
});

(async function initialize(){
  const {data,error}=await sb.auth.getSession();

  if(error||!data.session){
    window.location.replace('app-login.html');
    return;
  }

  session=data.session;

  const fullName=
    session.user.user_metadata?.full_name||
    session.user.user_metadata?.name||
    session.user.email?.split('@')[0]||
    'User';

  document.getElementById('profile-button').textContent=initials(fullName);

  const {count}=await sb
    .from('applications')
    .select('*',{count:'exact',head:true})
    .eq('candidate_id',session.user.id);

  applied=count||0;
  await loadJobs();
})();
</script>
