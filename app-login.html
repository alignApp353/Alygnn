<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alygnn Login</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--brand:#5D7FA3;--bg:#05080D;--card-bg:rgba(18,24,36,.94);--text:#FFFFFF;--border:rgba(255,255,255,.12);--text-muted:#A7B0BC;--error:#D79A9A;--success:#6FBF8F;}*{box-sizing:border-box;font-family:'DM Sans',Arial,sans-serif!important;}html,body{margin:0;min-height:100%;background:#05080D;color:var(--text);}body{min-height:100vh;background:radial-gradient(circle at top,rgba(93,127,163,.35),transparent 35%),linear-gradient(180deg,#05080D,#0A0F17);}.screen{min-height:100vh;padding:20px;display:flex;justify-content:center;align-items:center}.card{width:100%;max-width:430px;background:var(--card-bg);border:1px solid var(--border);border-radius:34px;padding:34px 26px;box-shadow:0 25px 70px rgba(0,0,0,.45)}.logo{text-align:center;font-size:52px;font-weight:900;color:var(--brand);letter-spacing:-2px}.subtitle{text-align:center;color:var(--text-muted);font-size:16px;margin-top:6px;margin-bottom:36px}.title{text-align:center;font-size:36px;font-weight:900;margin-bottom:28px}.input{width:100%;padding:18px 20px;border-radius:18px;border:1px solid var(--border);background:rgba(255,255,255,.03);color:white;font-size:17px}.input::placeholder{color:rgba(255,255,255,.45)}.input:focus{outline:none;border-color:var(--brand)}.password-wrapper{position:relative;margin-top:14px}.password-input{padding-right:68px}.toggle-password{position:absolute;top:50%;right:18px;transform:translateY(-50%);background:none;border:none;cursor:pointer;opacity:.75;color:white;font-weight:900}.forgot{text-align:right;margin-top:12px;margin-bottom:20px}.forgot a{color:var(--text-muted);text-decoration:none;font-weight:700;font-size:15px}.message{display:none;margin-bottom:14px;font-size:14px;font-weight:700;line-height:1.4}.message.error{color:var(--error)}.message.success{color:var(--success)}.btn{width:100%;min-height:58px;padding:16px;border-radius:18px;border:none;font-size:18px;font-weight:900;cursor:pointer;transition:.2s;margin-top:10px}.btn:active{transform:scale(.98)}.btn:disabled{opacity:.65;cursor:not-allowed}.primary{background:var(--brand);color:white}.social{background:transparent;color:white;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;gap:14px}.social-logo{width:24px;height:24px}.divider{display:flex;align-items:center;gap:14px;margin:24px 0 10px;color:var(--text-muted);font-size:13px;font-weight:700}.divider:before,.divider:after{content:'';flex:1;height:1px;background:var(--border)}.link{margin-top:28px;text-align:center;color:var(--text-muted);line-height:1.7;font-size:16px}.link a{color:var(--brand);text-decoration:none;font-weight:900}
</style>
</head>
<body>
<div class="screen"><div class="card"><div class="logo">Alygnn.</div><div class="subtitle">Where Opportunity meets talent</div><div class="title">Welcome back</div><div id="message" class="message"></div><input id="email" class="input" type="email" placeholder="Email" autocomplete="email"><div class="password-wrapper"><input id="password" class="input password-input" type="password" placeholder="Password" autocomplete="current-password"><button type="button" id="toggleBtn" class="toggle-password" onclick="togglePassword()">Show</button></div><div class="forgot"><a href="#" onclick="forgotPassword(); return false;">Forgot Password?</a></div><button id="signInBtn" class="btn primary" onclick="signIn()">Sign In</button><div class="divider">OR</div><button id="googleBtn" class="btn social" onclick="googleLogin()"><img class="social-logo" src="https://www.google.com/favicon.ico" alt="Google">Continue with Google</button><button class="btn social" onclick="Alygnn.showMessage('message','Apple login is not connected yet.','error')">Continue with Apple</button><div class="link">Don't have an account?<br><a href="app-create-account.html">Create Account</a></div></div></div>
<script src="alygnn-core.js"></script>
<script>
Alygnn.redirectIfLoggedIn();
function togglePassword(){const input=document.getElementById("password");const btn=document.getElementById("toggleBtn");if(input.type==="password"){input.type="text";btn.textContent="Hide";}else{input.type="password";btn.textContent="Show";}}
function getFriendlyLoginError(error){const raw=(error&&error.message?error.message:"").toLowerCase();if(raw.includes("invalid login credentials")||raw.includes("invalid credentials"))return "Incorrect email or password. Please try again.";if(raw.includes("email not confirmed")||raw.includes("confirm your email"))return "Please verify your email before signing in.";if(raw.includes("fetch")||raw.includes("network")||raw.includes("failed to fetch"))return "Unable to connect. Please check your internet connection.";if(raw.includes("too many requests")||raw.includes("rate limit"))return "Too many login attempts. Please wait a few minutes and try again.";return "Unable to sign in. Please try again.";}
async function signIn(){const email=document.getElementById("email").value.trim().toLowerCase();const password=document.getElementById("password").value;const btn=document.getElementById("signInBtn");if(!email){Alygnn.showMessage("message","Please enter your email address.","error");return;}if(!password){Alygnn.showMessage("message","Please enter your password.","error");return;}Alygnn.setButtonLoading(btn,true,"Signing in...","Sign In");const {error}=await Alygnn.signInWithEmail(email,password);if(error){Alygnn.showMessage("message",getFriendlyLoginError(error),"error");Alygnn.setButtonLoading(btn,false,"Signing in...","Sign In");return;}Alygnn.showMessage("message","Welcome back! Redirecting...","success");setTimeout(function(){Alygnn.replaceWith("app-account.html");},500);}
async function googleLogin(){const btn=document.getElementById("googleBtn");Alygnn.setButtonLoading(btn,true,"Opening Google...","Continue with Google");const {error}=await Alygnn.signInWithGoogle();if(error){Alygnn.showMessage("message",error.message,"error");Alygnn.setButtonLoading(btn,false,"Opening Google...","Continue with Google");}}
function forgotPassword(){Alygnn.showMessage("message","Password reset page is coming next.","error");}
</script>
</body>
</html>
