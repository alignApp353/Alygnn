<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alygnn Login</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800;900&display=swap" rel="stylesheet">

<style>
:root{
    --brand:#5D7FA3;
    --sage:#8CB69B;
    --bg:#05080D;
    --card-bg:rgba(18,24,36,.94);
    --text:#FFFFFF;
    --border:rgba(255,255,255,.12);
    --mint:#6FBF8F;
    --rose:#D79A9A;
    --text-muted:#A7B0BC;
}

*{
    box-sizing:border-box;
    font-family:'DM Sans', Arial, sans-serif !important;
}

html, body{
    margin:0;
    min-height:100%;
    background:#05080D;
    color:var(--text);
}

body{
    min-height:100vh;
    background:
        radial-gradient(circle at top, rgba(93,127,163,.35), transparent 34%),
        linear-gradient(180deg,#05080D,#0A0F17);
}

.screen{
    min-height:100vh;
    padding:34px 24px;
    display:flex;
    align-items:center;
    justify-content:center;
}

.card{
    width:100%;
    max-width:430px;
    background:var(--card-bg);
    border:1px solid var(--border);
    border-radius:34px;
    padding:42px 28px;
    box-shadow:0 24px 70px rgba(0,0,0,.45);
}

.logo{
    font-size:56px;
    font-weight:900;
    color:var(--brand);
    text-align:center;
    letter-spacing:-2px;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:var(--text-muted);
    font-size:17px;
    font-weight:500;
    margin-bottom:42px;
}

.title{
    font-size:38px;
    font-weight:900;
    text-align:center;
    margin-bottom:30px;
}

.input{
    width:100%;
    padding:19px;
    border-radius:18px;
    border:1px solid var(--border);
    background:rgba(255,255,255,.03);
    font-size:17px;
    font-weight:500;
    margin-bottom:16px;
    color:white;
}

.input::placeholder{
    color:rgba(255,255,255,.45);
}

.input:focus{
    outline:none;
    border-color:var(--brand);
}

.btn{
    width:100%;
    padding:18px;
    border-radius:18px;
    font-size:18px;
    font-weight:900;
    margin-top:10px;
    cursor:pointer;
}

.primary{
    border:none;
    background:var(--brand);
    color:white;
}

.social{
    background:transparent;
    color:white;
    border:1px solid var(--border);
    display:flex;
    align-items:center;
    justify-content:center;
    gap:14px;
}

.social-logo{
    width:24px;
    height:24px;
}

.apple-logo{
    font-size:28px;
    line-height:1;
}

.divider{
    display:flex;
    align-items:center;
    gap:14px;
    color:var(--text-muted);
    font-size:13px;
    font-weight:700;
    margin:26px 0 12px;
}

.divider:before,
.divider:after{
    content:"";
    flex:1;
    height:1px;
    background:var(--border);
}

.link{
    text-align:center;
    margin-top:30px;
    color:var(--text-muted);
    line-height:1.7;
    font-size:17px;
    font-weight:500;
}

.link a{
    color:var(--brand);
    font-weight:900;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="screen">
    <div class="card">

        <div class="logo">Alygnn.</div>

        <div class="subtitle">
            Where Opportunity meets talent
        </div>

        <div class="title">
            Welcome back
        </div>

        <input class="input" type="email" placeholder="Email">
        <input class="input" type="password" placeholder="Password">

        <button class="btn primary" onclick="window.location.href='app-home.html'">
            Sign In
        </button>

        <div class="divider">OR</div>

        <button class="btn social">
            <img class="social-logo" src="https://www.google.com/favicon.ico" alt="Google">
            Continue with Google
        </button>

        <button class="btn social">
<span class="apple-logo">Apple</span>
            Continue with Apple
        </button>

        <div class="link">
            Don't have an account?<br>
            <a href="app-create-account.html">Create Account</a>
        </div>

    </div>
</div>

</body>
</html>
