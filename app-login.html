<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alygnn Login</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800;900&display=swap" rel="stylesheet">

<style>
:root{
    --brand:#5D7FA3;
    --sage:#8CB69B;
    --bg:#05080D;
    --card-bg:rgba(18,24,36,.94);
    --text:#FFFFFF;
    --border:rgba(255,255,255,.12);
    --mint:#6FBF8F;
    --rose:#D79A9A;
    --text-muted:#A7B0BC;
}

*{
    box-sizing:border-box;
    font-family:'DM Sans', Arial, sans-serif !important;
}

html, body{
    margin:0;
    min-height:100%;
    background:#05080D;
    color:var(--text);
}

body{
    min-height:100vh;
    background:
        radial-gradient(circle at top, rgba(93,127,163,.35), transparent 34%),
        linear-gradient(180deg,#05080D,#0A0F17);
}

.screen{
    min-height:100vh;
    padding:34px 24px;
    display:flex;
    align-items:center;
    justify-content:center;
}

.card{
    width:100%;
    max-width:430px;
    background:var(--card-bg);
    border:1px solid var(--border);
    border-radius:34px;
    padding:42px 28px;
    box-shadow:0 24px 70px rgba(0,0,0,.45);
}

.logo{
    font-size:56px;
    font-weight:900;
    color:var(--brand);
    text-align:center;
    letter-spacing:-2px;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:var(--text-muted);
    font-size:17px;
    font-weight:500;
    margin-bottom:42px;
}

.title{
    font-size:38px;
    font-weight:900;
    text-align:center;
    margin-bottom:30px;
}

.input{
    width:100%;
    padding:19px;
    border-radius:18px;
    border:1px solid var(--border);
    background:rgba(255,255,255,.03);
    font-size:17px;
    font-weight:500;
    margin-bottom:16px;
    color:white;
}

.input::placeholder{
    color:rgba(255,255,255,.45);
}

.input:focus{
    outline:none;
    border-color:var(--brand);
}

.forgot{
    text-align:right;
    margin:-5px 0 20px;
}

.forgot a{
    color:var(--text-muted);
    text-decoration:none;
    font-size:14px;
    font-weight:700;
}

.forgot a:hover{
    color:white;
}

.btn{
    width:100%;
    padding:18px;
    border-radius:18px;
    font-size:18px;
    font-weight:900;
    margin-top:10px;
    cursor:pointer;
    transition:all .2s ease;
}

.btn:active{
    transform:scale(.98);
}

.primary{
    border:none;
    background:var(--brand);
    color:white;
}

.social{
    background:transparent;
    color:white;
    border:1px solid var(--border);
    display:flex;
    align-items:center;
    justify-content:center;
    gap:14px;
}

.social-logo{
    width:24px;
    height:24px;
}

.apple-icon{
    width:24px;
    height:24px;
    display:flex;
    align-items:center;
    justify-content:center;
}

.apple-icon svg{
    width:22px;
    height:22px;
    fill:white;
}

.bio-icon{
    width:30px;
    height:30px;
    display:flex;
    align-items:center;
    justify-content:center;
}

.bio-icon svg{
    width:28px;
    height:28px;
}

.bio-text{
    text-align:left;
}

.bio-title{
    font-size:18px;
    font-weight:800;
    color:white;
}

.bio-subtitle{
    font-size:13px;
    color:var(--text-muted);
    margin-top:3px;
}

.divider{
    display:flex;
    align-items:center;
    gap:14px;
    color:var(--text-muted);
    font-size:13px;
    font-weight:700;
    margin:26px 0 12px;
}

.divider:before,
.divider:after{
    content:"";
    flex:1;
    height:1px;
    background:var(--border);
}

.link{
    text-align:center;
    margin-top:30px;
    color:var(--text-muted);
    line-height:1.7;
    font-size:17px;
    font-weight:500;
}

.link a{
    color:var(--brand);
    font-weight:900;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="screen">
    <div class="card">

        <div class="logo">Alygnn.</div>

        <div class="subtitle">
            Where Opportunity meets talent
        </div>

        <div class="title">
            Welcome back
        </div>

        <input class="input" type="email" placeholder="Email">

        <input class="input" type="password" placeholder="Password">

        <div class="forgot">
            <a href="forgot-password.html">Forgot Password?</a>
        </div>

        <button class="btn primary" onclick="window.location.href='app-home.html'">
            Sign In
        </button>

        <div class="divider">OR</div>

        <button class="btn social">
            <img class="social-logo"
                 src="https://www.google.com/favicon.ico"
                 alt="Google">
            Continue with Google
        </button>

        <button class="btn social">
            <span class="apple-icon">
                <svg viewBox="0 0 384 512">
                    <path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.2-39.3.6-75.5 22.8-95.7 58C-17.2 269.2 13 373.6 54 430.6c19.6 27.8 42.9 59 73.5 57.9 29.5-1.2 40.6-18.9 76.3-18.9 35.6 0 45.6 18.9 76.4 18.3 31.7-.6 51.7-28.3 71.2-56.2 22.5-32.8 31.8-64.6 32.3-66.2-.7-.3-61.4-23.5-61-96.8zM259.5 102.5c16.3-19.8 27.3-47.3 24.3-74.5-23.5.9-52 15.7-68.8 35.5-15.1 17.4-28.3 45.4-24.7 72.1 26.2 2 52.9-13.3 69.2-33.1z"/>
                </svg>
            </span>
            Continue with Apple
        </button>

        <button class="btn social">

            <span class="bio-icon">
                <svg viewBox="0 0 24 24" fill="none">
                    <path d="M12 12C10.3 12 9 13.3 9 15V17" stroke="white" stroke-width="2" stroke-linecap="round"/>
                    <path d="M15 15V17C15 20 13.5 22 12 22" stroke="white" stroke-width="2" stroke-linecap="round"/>
                    <path d="M6 15V16C6 20.4 8.7 24 12 24" stroke="white" stroke-width="2" stroke-linecap="round"/>
                    <path d="M18 15V16C18 19.6 16.5 22.7 14 24" stroke="white" stroke-width="2" stroke-linecap="round"/>
                    <path d="M7 10C7 7.2 9.2 5 12 5C14.8 5 17 7.2 17 10" stroke="white" stroke-width="2" stroke-linecap="round"/>
                    <path d="M4 10C4 5.6 7.6 2 12 2C16.4 2 20 5.6 20 10" stroke="white" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </span>

            <div class="bio-text">
                <div class="bio-title">Quick Sign In</div>
                <div class="bio-subtitle">
                    Use Face ID or Fingerprint
                </div>
            </div>

        </button>

        <div class="link">
            Don't have an account?<br>
            <a href="app-create-account.html">Create Account</a>
        </div>

    </div>
</div>

</body>
</html>
