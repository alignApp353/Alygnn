<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alygnn Login</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#F6F8F7;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    width:90%;
    max-width:400px;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 4px 20px rgba(0,0,0,.08);
}

h1{
    text-align:center;
    color:#1A2530;
}

input{
    width:100%;
    padding:16px;
    margin-top:15px;
    border-radius:12px;
    border:1px solid #ddd;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:16px;
    margin-top:20px;
    border:none;
    border-radius:12px;
    background:#5D7FA3;
    color:white;
    font-size:16px;
    font-weight:bold;
}

.signup{
    text-align:center;
    margin-top:20px;
}
</style>
</head>

<body>

<div class="card">

    <h1>Welcome to Alygnn</h1>

    <input type="email" placeholder="Email">

    <input type="password" placeholder="Password">

    <button onclick="window.location.href='app-home.html'">
        Sign In
    </button>

    <div class="signup">
        Don't have an account?<br><br>
        <a href="app-create-account.html">
            Create Account
        </a>
    </div>

</div>

</body>
</html>
